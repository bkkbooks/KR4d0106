body:
  text: 樂圃餘藁目録别集類二宋卷一古詩卷二排律律詩卷三律詩卷四律詩卷五絶句挽詩卷六記卷七序題辭卷八啓律賦卷九世譜書題跋祭文銘卷十墓志臣等謹按樂圃餘藁十卷宋朱長文撰長文字伯原蘇州吳縣人未冠登進士乙科以足疾不仕築室樂圃坊著書閲古蘇軾等薦起本州教授召為太常博士遷祕書省正字生平著述甚富所撰詩詞賦辨表章雜說凡百卷號樂圃集南渡後盡燬於兵其從孫知漢陽軍思裒集遺文得詩百六十有三記五序六啓七墓志五雜文六類為十卷又以墓銘表傳等為附録一卷鋟諸木嵗久僅存寫本康熙壬辰其裔孫嶽夀重刋行之附補遺詩一贊一則明嘉定陸嘉穎所搜補也稿中墓銘或署其父公綽名銜蓋長文少作從石刻中録出者亦可見思當時搜討之勤矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:940855648291207f73879f318eb18e8af96f91f84917637a989809e9713decbc
