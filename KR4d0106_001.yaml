body:
  text: 樂圃餘藁巻一宋朱長文撰古詩公堂置酒羣彦咸集作詩呈學中諸先輩且用叙别漢有郡文學儒宫所宗師稚圭雖歎滯鄧禹猶願為聖朝興庠序内外振新規嗟余介且拙性與邱壑宜青山起泮水六月開辛夷經術聊辨惑文章非振竒羣英何濟濟屈就董生帷講習良可樂斆學交相資但觀芹藻長不䘏顔髩衰忽傳太學命飛詔下天涯自省草茅賤豈稱廊廟知親友頗敦迫黽勉趨官期生平好古心或冀伸此時偶兹春奠畢將與諸生辭濁酒多如澠頒貺自守麾鄉飲乆不講禮意猶可追髙閣矗丹檻公堂煥雲􅎝裒衣二百衆齒髪叙尊卑籩豆儼在列鵷鴻來有儀珍饔薦瑶觴雖醉尚肅祗式燕固云喜有行尤愴離勉旃重勉旃脩業戒荒嬉黼繡在德義金玉惟詩書豫章生拱抱羣木共葳蕤養之得其性自有凌雲枝又如甽澮流不息趨天池居鄉為閔參得志慕臯䕫當令竹帛間炳炳令名垂佳雨應祈因昔年諸友作詩今再叙舊晏侯昔為州嵗旱慶霖雨夫君與方子吟思共清苦不才輒繼聲玉石愧同處賡訓自邦君髙詠編幕府開編讀英辭風義恨修阻歴年屈指八閱守今已五自晏昜五守溫溫劉蘇州謂夢得揚仁美風土篇章極清新操行到淳古去年掌膠庠幸此廕德宇遇君來自西暫作臯橋旅謂公權並游盍簪裾良宴陪樽俎辱顧眼俱青言詩多見與近當庚伏間不雨病禾黍田乾如龜裂一溉勞逺取如惔沴氣生望歳羣心沮園居雖閒曠何處逃蘊暑使君憂憫深雩祀以時舉精誠禱祠下若與神告語隨車油飛雲闔境膏澤溥稿苗興膴原涸轍通别浦萬輪水可汲千笠草務去秈禾與稏稻指期入我庾清暉登谿山餘潤滿林圃中吳垂白叟買酒相忭舞掃石邀良朋清風快談麈此時無一詩懽意何以叙朝家日隆平二聖保基緒施仁塞天淵敷政皆堯禹舊臣留旦奭新相拜房杜風和調舜琴俗厚空周圄銷變召泰和協氣應律吕吾儕夙承學嘉慶幸親覩相期美康平復見頌多稌次韻送毛正仲太博赴召馬周起布衣一日見紫宸獻言中機會數歳持衡鈞歎息慕前哲誰能繼清塵毛公東南美迥掩竹箭珍髙才與精識卓爾出天真論政明得失談兵到機神天戈討梅山婉畫昔已伸一官遇賢守相與康吳民孰云芙蓉幕人卧五色麟聖君馭羣材功業圖日新旌麾頗牧用帷幄良平臻竒士求即至當世有偉人君今赴明詔亨會在此辰夕發碧江外秋過清泎津彤庭敞神麗文陛髙嶙峋良籌上意合深䇿廟謨親功名立少壮富貴将追身我亦有志者卧疾松陵濵耰鋤代長鋏韋帶比華身髙懷未遐棄荒徑枉朱輪纚纚聽君語懦夫氣益振病騮觀逸驥舉首嘶鳴頻尚期居要路迴光及幽淪轉運少卿生日昔在章聖朝先君為名臣入陪儒林老出擁使者輪忠謨與休烈萬世永不泯惜哉未大任天意昌後人公生韞俊德磊落功絶倫深林有條梅不揉自可珍外隅正以方中府粹且仁沛然施之事迅若般之斤自聨金閨彦頡頏三十春牙籌析經費龍節綏逺民朅來天畿東威譽薄海垠羣情無遁照衆理日益勤吏徑皆敞闢敝根悉鋤耘惸惸舊鰥寡今也皆不貧闔部數百城膏澤一以均正月方在浹是日為生申東人競祝公百福叢于身同宗復荷德善禱乆所陳况公方耆艾百行享明神俾公永且康筆端扶化鈞俾公熾而大膝下森華紳近得舉之躅荆南侍郎前望伯虎塵朱虎先閥期益顯蹇品庶可親送魏君致逺之吳興兼寄祝修中庠中今多材燦若荆岫玉琢磨觀粹美尤愛魏與祝二子幼相友共學横山麓抱書來泮宫美質異碌碌文辭堪適用光瑩輕縑幅前年掇高選麗賦人爭録吳興太守賢好善下白屋貽書勤聘禮掃榻待英躅伯樂過冀北所顧皆驥騄翩翩告别去舟泛苕溪渌南陔急親養聊以奉水菽愧我不能留嗈嗈想鴻鵠良辰振六翮一舉聳羣目雲漢期高翔稻粱非所欲少章過吳門寵示淳夫子瞻唱和并惠山寄少游之什俾余繼作輒次二公韻以寄之懷友對華月身如匏繫何遥聆金玉音悵望江湖波憂來誦三篇調飢餉嘉禾蘇范天下賢閲士歳月多憐君似蘭芷長育瑶山阿良工得寳璧韞櫝加琢磨發為驚人語九曲傾洪河蟠蜿寄短章浩蕩寫長歌一官得武陵萬景盡包羅又如彈響泉餘韻清且和籍湜師韓文其則在伐柯俯視枳棘間翔鸞豈蹉跎聖朝頌聲作周雝與商那二公且大用豈得歸岷沱詠齋偶書呈子通無隱夙志在蕭閒獲此幽遁迹喬林無冬春蒼靄異晨夕旁窺疑好峯俯瞰驚峭壁浩然溪山興盡在陶潛宅杖藜行水邉萍際湛空碧良魚不輕游弱羽猶自惜吟髭不禁霜曉鑑見早白古人已深歎信是林園客遣累假禪鋒陶情任詩格寄聲招友人來看亭前柏次韻李子功留别之作采蘭無復養嬰此終天悲家空弱妹長恐失桃夭時翠蔓倚長松之子得所隨銜桮欵相遇摻袂傷蹔離洞庭春風髙楊栁緑江湄柴門歸獨掩桂楫暮何之眷眷厚有餘佳什猶見貽散帙渴精論言詩佇良規惜哉片㠶去快若駟馬馳東臯多樂事歸計勿遲遲謝虎邱祖印相訪支嶺高風逺杼山佳句稀雲巖有開士詩理到精微不知蓬户隘未勌金鐶飛忘形任談笑敷袵評是非近師宣城老逺慕蘇州韋我亦有吟癖古人思與歸願聞碧雲篇所得如珠璣漁樵早晩出乘興叩禪扉謁郭道冲唐師德登臺偶作衝寒歩郊原煙水照林薄雪餘山色佳浦浚湖波落静可釣綸垂清欲塵纓濯相逢兩俊友辭義富金臒携手登高臺談笑有真樂寸眸周逺近幽思騰寥廓逝将飛片帆直到洞庭脚縶維阻並遊搔首向城郭春秋終講伏蒙知府諫議臨視學舍燕勞諸生謹成小詩敘謝泰山先生久冥寞世把春秋束髙閣腐儒退隱三十年獨玩遺經思筆削濫居師席愧匪才日演微言更歳籥欲遵廣路視堂奥誓闢浮雲窺碧落兹辰講解告終篇敢屈邦君親視學邦君舊現補衮才忠論嘉謨動宸幄宻為福澤徧寰瀛暫得麾符出京洛愛民如子不忍傷政用中和屏威虐深惟教本在庠序力助儒風止姦惡羣材儻得就長育百堵何為憚興作躭躭黌舍盡修嚴翼翼公堂驟清廓已欣華搆将落成肻枉雙旌率僚幕清晨初謁二公祠重道嚴師致恭恪更忘煩暑臨講席自降威容聽揚㩁羜肥酒釃宴友生金印煌煌對褒博傳聞長幼相告語爭誦詩書親敎約歡聲四出屏陰沴雲霧俄收日華爍乆雨是日晴曦文翁化蜀士皆成魯侯修泮民思樂自慚傳道竟何補禄食充飢免藜藿幸逢賢守善承流喜與吳人醉優渥樂圃餘藁巻一
