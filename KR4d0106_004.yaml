body:
  text: 樂圃餘藁巻四宋朱長文撰律詩知府司封見和喜雨詩韻陳謝天意分明應魯雩髙壇晨拜紫袍濡禽窺舊井寒泉長魚泳新荷涸轍蘇敏政有餘閑利刃清詩無類擲靈珠夏畦䝉潤秋臯稔顔巷銷憂卒嵗娛送榮子揚齋郎茹蔬酌水度清晨自是浮生潔静身好事頻過三徑晩愛閑惜别五湖春品泉暗識南零味鑒茗多藏北苑真且著青袍居膝下少年未羨折腰人次韻公權燈花蘭膏未耗結花新花自無情喜在人生向輕籠先得地開從細熖别装春飛蛾雖遶光難掩梦蝶初廻色尚匀更待玉堂清夜直賜來蓮燭影相隣次韻俞子文南軒雨後農疇已種圃畦青髙卧邱園自放情客少不嫌三徑濕年豐休歎一瓢清殘鶯喜向風前囀病鶴猶能月下鳴千載令名如有得莫愁軒冕老無成次韻俞子文感事我曽折桂向蟾宫君有文華似彩虹連蹇未酧平日願嘯歌猶得故鄉同不才甘作耕巖叟有志宜為結駟翁窮達由來都似夢幾人曽是黒頭公次韻楊彛甫見成甫装縹舊書之什儒者須看萬巻書古人精博固難如殘編莫惜装褫費舊迹堪憐繕寫初輕撥蠧魚文未損平齊緗袠架無虚白頭且更窮經藝誰道忘筌便得魚次韻公權庾中成詠坐局偷閑歩小橋風隨秋葉過蕭蕭愁多萬斛量難盡飲次千鍾困昜銷笠澤狂歌方繼陸海門髙隱莫如焦焦光所隱在海門旁世謂焦山昔儒委吏猶堪處誰道倉公厭寂寥喜公權仲逢垂訪髙軒相約訪柴關蕭灑如君會合難雨徑偕行穿履濕風亭乆佇袷衣寒百忙好向閑中息萬動宜當静處看公暇再來應不倦柬籬金蕊未凋殘曉坐朋齋懷公紹曉來乘興歩髙岡便就幽齋作醉鄉隣寺樓臺分兩面一家池舘得中央南坡嫩橘寒傾日北牖疎筠小帶霜更待怪松擎積雪莫辭訪戴舉瑶觴次韻蘇文饒見貽之什閒釣松陵閱嵗多家林終日對煙蘿茹芝深隱慙商皓獻璧求知笑卞和静送征鴻雲外翼吟看老桂月中柯洛陽年少才驚俗車馬猶從陋巷過次韻樞言龍圖得請洞霄之作世間如幻此生浮寧典仙祠不典州決勝金城勲烈茂宣風玉壘治聲優逺移遁跡無嘶馬舊得調元問喘牛耆俊如公宜大用行聞召節趣蘭舟平生氣節薄青雲不任機心只任真金為散多虛越槖衣從洗淨逺京塵吟隨猿鶴滄洲晩醉賞鶯花茂苑春仰止髙賢同里閈掃門羞未效前人次韻公紹賀崇静之賜金紫北窓二紀傲羲皇節比淵明事更光共喜遐齡垂紫綬莫嫌猛退棄銅章文房句就心常佚藥鼎功成壽轉長七品官階三品服滿斟緑醑醉春陽乆脫朝衣襲野裳親逢盛旦日重光耕田鑿井堯民事垂組懷黄漢服章諸老相懽陶聖治兩宫遥祝與天長謫仙才調今誰是肻解金龜燕夕陽次韻徐中散丙寅二月見訪之什數年解綬隱林扉乘興頻來訪習池老似樂天兼少病官如叔夜又能詩身閑幸與耆英接學淺虚蒙國士知白雪佳章難復繼䇿駑追驥自嫌疲祖母生日挺生賢德對耆英嵗物皆新氣淑清年至七旬人羨少子為四品世稱榮紫泥屢捧門多慶華髮雖稠體益輕欲比遐齡何所似蟠桃結實老仙京判府曹宣徽生日二首星杓指未月増弦神選良時協半千恭慎動遵長樂意潔清能紹兾王賢兾王平蜀克金陵秋毫無所取緩垂相印淹公論堅請州符避劇權四十擁旄非不貴更看黄髪珥貂蟬盛世髙門福兩全星辰粹氣萃為賢釣璜韜畧傳三葉齋鉞風稜積十年陰德在人宜壽考清才脱俗恐神仙寒儒欲繼崧髙頌不獨生申但美宣申伯乃宣王元舅郡牧李侍郎生日柱史仙翁舊指枝生賢左右太平基居留成就昭陵後賜告從容故里時籌䇿乆為當世重勲勞方受兩宫知欲祈天錫公睂壽更過芳蓮葉上龜當年弧矢設門䦨英氣鍾於曲阜間名覆金甌新品地香盤宻印舊家山腰邊龜組光華動膝下龍駒禮法閑五福俱全誰跂及流霞為壽日開顔閏月丙子判府相公被制命升使弼越六月癸卯公誕生之日某謹齋潔為詩二章拜獻左右雖辭句蕪纇不足奉揚盛德姑以述惓惓之誠武德隂功積在民既生太姒復生申手提将鉞雖三世身到台衡始二人膝下龍駒環壽斝日邉鳯使捧恩綸公拜命又生日恩賜者再至焉沙堤築就朱衣引富有青春尚四旬宣制初聞下玉墀又逢盛事協熊羆青霄靈昴凝祥乆紫府蟠桃結實竒養志曽添龜鶴筭避權重讓鳯凰池公建節十餘年至相位有表再讓從今若校中書考屈指當如郭子儀元厚之少保生日四紀勲榮動冕旒倦趨黄閣傍滄洲名如白傅身尤貴才繼㣲之德更優千載神龜巢葉穩九霄老鳯帶雛遊蓬萊水淺公猶健輝照東南對斗牛荅人見慶除博士幅巾短褐對江雲閑把群經自討論魯泮未能開後學虞庠豈稱講㣲言羸駒乆絶騰驤望病木猶沾雨露恩蔣徑雖荒陶菊在徘徊惟恐去吳門元少保生日孟夏堯蓂六葉殘來從仙府瑞人寰幾年彩鳯池中浴此日神龜葉上閑七老相懽惟将相二疏髙㝠欠湖山羨公退自台衡地長在煙霞縹𣺌間體貌方隆避政樞歸來衮繡耀東吳騎鯨才格從天稟化鶴風姿與衆殊經國文章垂睿想濟民德澤感神扶堂邉三壽髙千丈依舊扁舟泛五湖程給事新第朱門不鎖走朱輪東省仙材晝錦人石上雲輕林屋曉花頭露重洛陽春謝公棊戰烏巾静裴令呤髙緑野新他日南園真可乞滿池煙水正相鄰判府蒲左丞寵贈佳篇謹次韻髙文大冊耀天衢新句鏘金擲隱居廊廟方将歸輔弼江湖猶復念耕漁百城草木知威望一代賢能入薦書近日東南興節士既旌吳子又襃徐公既薦吳祖求顯于朝又作髙士坊谷口堂以追襃徐復次韻公權喜太守再留不為機巧不求新坦坦襟懷任道真揭節二方陰布德分符千里别生春兒童共喜重迎伋父老相懽許借恂池閣逍遥無一事清風入座轉汀蘋近承南康朝請使君寵訪林圃小酌至夜公權特惠篇什謹次韻栝柏森森覆小臺凌風采菊共銜杯東籬寂寞陶翁醉連騎繽紛衛相來放浪五湖慙釣客均調玉燭仰璇魁秋河半夜簷前轉誰泛仙槎去却廻奉陪太守及諸公遊虎邱何必襄陽孟浩然苦吟自可繼前賢虎邱合去十二度見白公詩熊軾再遊三百年雲閣為君追舊額飛雲閣本名齊雲樓今追復之霓裳從古播朱絃白公在蘇作霓裳曲此行不減唐人樂暢飲惟無八酒仙樂圃餘藁巻四
