body:
  text: 樂圃餘藁卷五宋朱長文撰絶句次韻蒲左丞遊虎邱十首玉堂紫閣冠英遊身作三公未白頭須向鳯凰池上浴豈容蕭散詠林邱掃石捫蘿向上行門前坐見白雲生應思夢得多佳趣獨宿樓中待月明劉夢得登虎邱望海樓詩云野僧已閉户山月方出嶺地近峰低俗慣遊不知絶景冠吳州從今合與名山等左轄題詩翠嶺頭羣山處處盡凌空未若竒峯隱寺中一夜便知名不棄為傳佳句滿江東萬丈澄潭挾兩崖削成竒壁自天開龍泉一淬名因得不待秦王發塜來劍池得名蓋古人淬劍之地謂秦王求劍裂為池恐非也層巒稍稍暮雲歸喬木森森衆鳥依再踏石花尋去路畫船一隻帶斜暉邱如蹲虎占吳西應得佳名故國時未必金精能變化空傳怪説使人疑海湧當年有舊山吳王侈葬倚層巒誰知國破邱陵在兄弟幽居屬二難乃王珣王珉舊宅西溪風月宜真賞東嶺煙霞稱苦吟他日黃扉勤論道秋風一夢到山林雲霞咫尺壓吳郊乘興斯須棹小舠欲往結廬嗟未得羡他吳氏有三髙南史何求兄弟三人皆隱世號三髙嘗居虎邱秋月乘興遊松江至垂虹亭登長橋夜泊南岸旦遊寧境院因成十絶呈君勉且寄子通綵衣幾度醉江濵今日重來淚滿巾惟有舊詩存屋壁豈知投老負垂綸前哲臨流猛拂衣身違憂患是先機非才自合居間曠不泛五湖何處歸雲動鑑中雙槳飛天圍林外片帆歸欄杆倚遍日云暮坐看丹霞生翠微人爭軒冕安在哉我愛煙霞歸去來魯望有靈還見笑更回城郭戀塵埃兩山映日磨蒼玉萬頃涵虛皺碧羅不會樂天猶近俗謾將絃管雜煙波樂天嘗携樂遊松江長虹穩臥碧江心夢寐頻遊覺莫尋歡友相逢清絶處酣歌一曲抵千金漠漠秋煙羃故園沉沉暮色瞑漁船月華未出詩翁逺樂事人間少十全詩翁懷子通也銀潢倒㵼入滄溟身近魚龍夜不驚鳴櫓空飛孤雁過漁燈照浦一星明茅舍蕭疏竹葦間開軒處處面雲山詩家不及漁家樂坐卧湖光百慮間江裏鱸魚味不羶江頭酒美滑如泉長橋為席雲為幕秪欠洪崖笑拍肩華亭吳江道中偶作十絶人間出鶴只雲間相合仙經得亦難塵外應多隨羽客未教流俗等間看舟去舟來閲古今夢中憂樂纍人深慿將一掬松江水未洗塵纓且洗心白日歸來皆有意平生事了最為難可憐萬頃煙波色只屬天隨醉眼看千古鴟夷節獨髙脫遺富貴一鴻毛館娃宫女曽亡國豈獨相携泛海濤妖華傾國豈無情忍復顰睂見越兵若使將軍猶好色安能三徙更成名賢哲多為貴勢拘人人空道愛江湖誰將五鼎盈前食肻換秋風一箸鱸煙暝重湖日欲明輕篷遙遞浦前聲良魚好入深淵去不為鳴榔取次驚川上飛橋處處橫幾回經此閲平生碧蘆蕭瑟風前韻一似家林霰雪聲吹散青雲見好峯家林秪在此山東寄聲猿鶴休悲怨蕙帳今宵遂不空獨當家責性難堪五女同孤已嫁三更待人間了塵事别尋雲外結茅菴求笻杖霜筠來自蜀山遙天骨輕清素節髙我若得之如佩玉君應輟此似秋毫求虎邱竹徑節難同衆草看根深更入白雲蟠園廬種此多餘地為向西南斸數竿舊説種竹須取西南引嫩根不然不生也歸隱橋新成偶題三絶句書呈同志樂圃記改名招隱幽居處處映煙蘿歸隱橋邉月色多蟾桂有情憐病叟清光終夕照酣歌挂却簪纓裹幅巾清流繞舍斷紅塵小橋何用通來往猶為凝冬病涉人逢人尚欲開松徑送客應休過筆溪此橋下臨筆溪林下有誰頻肻顧春深好聽子規啼詠齋三絶泰伯祠邉舊圃開半栽蔬果半池臺間門不放紅塵入門裏清流自在來塵冠寂寞更休彈車轍荒蕪晝掩關一片清暉長在眼多情惟有四飛山非山非市且優遊尚有塵緣未自由巖下結廬應更好石門西去近松楸次梅評事韻瓶盂蕭灑似村家任有籯金豈足誇自入醉鄉頭不白新詩何用祝蒼華施柏花開招子通桃李芳時不肻來俄隨風雨落莓苔齋前施柏花如錦猶待詩仙醉眼開青龍江上偶書兩絶呈無逸監鎮潮滿溝塍稻滿田暑天不雨自豐年海商有貨官無擾遊子爭來就一㕓卷碇初來海客船脫身鯨浪見吳天千帆總約秋風至應助關征額外錢海賈千艘萬貨集江邉爭較錐刀逐利遷生理幸逃魚腹餒夢魂猶怕蜃樓煙陸寶山陸家山色隱平蕪文彩如虹照碧虗痛爾臨刑思鶴唳輸他謝病食江鱸江浦一川吐納五湖深海裏三山何處尋料得鴟夷從此去古來煙水祗如今次韻司封使君和程給事勝地寬間舊卜鄰耆年得意闢髙門中吳晝錦如公少好作坊名賁故園程公以其地右兩寺左南園置為宅基久矣近嵗始成而未間有坊名次韻司封使君和程給事越來溪三章溪色如藍照舳艫越王金碧獻姑蘇館娃宫裏長髙枕不覺舟師到國都萬舸連雲載水犀旌旗倒影蔽長隄誰知數歲干戈後不是吳溪是越溪忠魂自逐滄波去往恨空隨茂苑春若使吳王思後患屬鏤只合賜讒人挽詩英宗皇帝挽詞五首仁廟規模逺慈闈教愛隆承平萬世䇿臨御五年功玉鎖開天上金縢納匱中乘雲那復見陵柏起悲風英斷能承祖慈祥善繼仁詩書教宗室禮貌待元臣損已遲徽册恭天徹步茵昔年平水患盡力在斯民代邸推賢久甘盤授學精持盈周鼎重立長禹謨明仙館靈芝秀嚴祠宿潦平歷觀唐漢盛未若廟稱英鳯翼行將逺龍髯斷莫尋白雲留穆御黃屋豈堯心雖享天齡淺終成睿算深垂鴻須萬祀纍葉奉薑任有德三宗後無憂纍聖間鳯當金粟翥龍隔鼎湖攀玉几言猶在霓旌去不還園林饒瑞氣東接永昭山邵湘母華屋辭榮養佳城合舊封浮生無定相衆善有遺蹤家盛金籯在山長玉案重浮圖傳勝事寶殿壯天峯張虞卿一臥東吳七十春區區南北笑鄉人盛開黌舍招英俊敞闢華堂待縉紳婉婉重孫勝綵服煌煌兩壻擁朱輪銘旌已去空回首通德門前舊是鄰林少卿壽考安榮遇聖朝搆成門户自勤勞閨中萊婦皆華髮膝下荀龍盡緑袍堂有金籝身更約案披玉簡道尤高人間厚福終歸盡漲海難停一夜濤黃朝散持心平厚勝澆浮仕路徊翔四十秋政事每於談笑辦交親多向急難收命由真宰隨窮達身在勞生任去留舊治昔年應畫像龎睂聞訃淚先流江湖嘗佩左符歸一臥漳濵素願違平日華旌過里巷此時丹旐下巖扉羣峯拱揖開新穴萬木森羅長舊圍佇看于門驅駟馬想應邱隴亦光輝樂圃餘藁卷五
