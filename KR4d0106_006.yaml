body:
  text: 樂圃餘藁卷六宋朱長文撰記樂圃記大丈夫用于世則堯吾君虞吾民其膏澤流乎天下及乎後裔與夔契並其名與周召偶其功茍不用于世則或漁或築或農或圃勞乃形逸乃心友沮溺肩黃綺追嚴鄭躡陶白窮通雖殊其樂一也故不以軒冕肆其欲不以山林喪其節孔子曰樂天知命故不憂又稱顔子在陋巷不改其樂可謂至德也已余嘗以樂名圃其謂是乎始錢氏時廣陵王元璙者實守姑蘇好治林圃其諸子徇其所好各因隙地而營之為臺為沼今城中遺址頗有存者吾圃亦其一也錢氏去國圃為民居更數姓矣慶厯中余家祖母吳夫人始購得之先大父與叔父或遊焉或學焉每良辰美景則奉板輿以觀于此厥後稍廣西壖以益其地凡廣輪逾三十畝余嘗請營之以為先大父歸老之地熙寧之末新築外垣盡覆之瓦方將結宇而親年不待既孤而歸于是遂卜居焉月葺歲增今更數載雖敝屋無華荒庭不甃而景趣質野若在巖谷此可尚也圃中有堂三楹堂旁有廡所以宅親黨也堂之南又為堂三楹命之曰邃經所以講論六藝也邃經之東又有米廩所以容歲儲也有鶴室所以畜鶴也有蒙齋所以教童蒙也邃經之西北隅有高岡命之曰見山岡岡上有琴臺琴臺之西隅有咏齋此余嘗撫琴賦詩于此所以名云見山岡下有池水入于坤維跨流為門水由門縈紆曲引至于岡側東為溪薄于巽隅池中有亭曰墨池余嘗集百氏妙迹于此而展玩也池岸有亭曰筆溪其清可以濯筆溪旁有釣渚其靜可以垂綸也釣渚與邃經堂相直焉有三橋度溪而南出者謂之招隱絶池至于墨池亭者謂之幽興循岡北走度水至于西圃者謂之西澗西圃有草堂草堂之後有華嚴菴草堂西南有土而髙者謂之西邱其木則松檜栝柏黃楊冬青椅桐柳栁之類柯葉相蟠與風飄揚髙或參雲大或合抱或直如繩或曲如鈎或蔓如附或偃如傲或參如鼎足或並如叉股或圓如蓋或深如幄或如脫虬臥或如驚蛇走名不可以盡記狀不可以殫書也雖雪霜之所摧壓颷霆之所擊撼槎牙摧折而氣象不衰其花卉則春蘩秋孤冬曄夏蒨珍藤幽花髙下相映蘭菊猗猗兼葭蒼蒼碧蘚覆岸慈筠列砌藥録所收雅記所名得之不為不多桑柘可蠶麻紵可緝時果分蹊嘉蔬滿畦摽梅沉李剝瓜斷壺以娛賔友以約親屬此其所有也余于此圃朝則誦羲文之昜孔氏之春秋索詩書之精微明禮樂之度數夕則泛覽羣史歷觀百氏考古人是非正前史得失當其暇也曵杖逍遙陟高臨深飛翰不驚皓鶴前引揭厲于淺流躊躇于平臯種木灌園寒耕暑耘雖三事之位萬鍾之祿不足以昜吾樂也然余觀羣物無一物非空者安用拘于此以自贅耶異日子春之疾瘳尚平之纍遣將扁舟河海浮遊山嶽莫知其所終極雖然此圃者先光祿之所遺吾致力于此者久矣豈能忘情哉凡吾衆弟若子若孫尚克守之毋頺爾居毋伐爾林學于斯食于斯是亦足以為樂矣余豈能獨樂哉昔戴顒寓居魯望歸隱遺迹迄今猶存千載之後吳人猶當指此相告曰此朱氏之故圃也元豐三年十二月朔吳郡朱伯原記蘇州學記元祐五年歲次庚午秋七月甲子朔建兩儀定位禮義興矣五教既敷學校立矣禮義不可一日忘故學校不可一日廢也昔唐虞三代之盛未嘗不以建學嚴師為先務內則王庶子羣后卿大夫元士之適子其入以齒外則孰黨鄉遂之間其教以時下至于四方萬國之逺皆命之為庠序其法詳矣故始于直寬剛簡而防其失次以歌詩音律而致其和者此堯舜之典樂所以教也以智仁聖義忠和為之德孝友睦姻任恤為之行禮樂射御書數為之藝此周大司徒卿大夫所以教也上之所以教于下下之所以應于上若置郵而傳命也若決江河莫之能禦也書美萬邦黎獻可以共為帝者之臣詩稱成人有德小子猶有所造其材之可用如此蓋當是時風化行習俗美人人有士君子之器雖畎畝之賤山林之幽亦為仁義之所漸摩禮樂之所陶染咸入于善罝兔而不忘敬敦詩音徙端切葦而不忍踐豈有暴亂萌于心姦宄害于事者哉此建學之效也王道衰禮義廢獨一魯侯能修泮宫囚馘之獻猶不離此邦人頌焉戰國之際孟軻猶歷説時君謹庠序之教申孝悌之義終濶而不用習大亂迄于秦棄儒任法民不知學而疾視其君蜂起而墟秦矣漢方休息元元未遑先王之教世宗奕奕首善于京其臣有若董仲舒者為大夫文翁者為守吏皆尚儒術乃詔置博士弟子之員而立學校官于郡國其課士必以經藝蓋士不素養則德難遽考使因學以知經因經以會道庶乎有成矣東京內盛三雍之儀不及于外而鄭興賈逵馬融鄭康成之徒繼為人師以經相授囊括六典六學寖明是以時政雖亂于上而義士交起于下抗節濡足用救陵夷漢賴以不亡者百餘年魏分晉弱事不足道唐之文物盛矣而尚賦以取人世薄經術以文辭相夸夫文所以宣志也觀其文則志可廋哉故元臣碩老多由詞科以出神宋受命遏亂興治乘輿嘗幸國庠親臨講席是時勳臣宿將並列藩鎮庠序雖未興而鴻儒碩生聞風以起有若戚堅素在睢水种明逸在終南皆聚徒講授髦俊歸之其後陪京方面之守臣稍請興學自景祐中范文正公作學于吳又創于潤滕子京建于湖慶厯之盛文正公參豫機政而石守道孫明復首居太學是時仁宗開天章閣召輔臣八人問以治要文正公復以學校為對于是詔天下皆立學神宗之時立三舍法置方郡教官皆試可而後授今上嗣位申命近臣薦堪內外學官者方聖朝承平之久而長育之勤雖瀕海裔夷之邦執耒垂髫之子孰不抱籍綴辭以干榮祿裒然而赴詔者不知其幾萬數蓋自昔未有盛于今也凡命教之法以經術觀其學以詞賦觀其文以論䇿觀其智所取兼于漢唐而德行道藝之士參出乎其中矣然欲合二帝三代之法使人人有士君子之器皆在吾君相之所潤色也始姑蘇郡城之東南有夫子廟所處隘陋及文正公以天章閣待制守是邦欲遷之髙顯相地之勝莫如南園南園者錢氏之所作也髙木清流交蔭環釃乃割其巽隅以建學廣殿在左公堂在右前有泮池旁有齋室是時學者才逾二十人或言其太廣文正曰吾恐異日以為小也于是召安定先生首當師席英才雜遝自逺而至厥後登科者逾百數多致顯近由景祐迄今五十餘載學者倍蓰于當時而居不加闢也某適忝命掌學周視黌舍傾陊褊迫寒薄暑焮諸生病之來者無所處乃與同僚議請南園隙地以廣齋廬屢諗于郡守部刺史病財用之不給會文正之子兵部侍郎公純禮以厚德逺業見器朝廷出自奉常制置江淮六路漕事擁使者節過鄉上冢乃以學舍之微白公公既即學拜文正公遺像延見諸生感慨陳迹即奏言蘇潤之學皆先臣所建後人久不葺而齋室不庇風雨講習無所願給錢修廣而今太守諫議王公在潤先以潤學為請有詔給以度牒十紙充其費時元祐四年五月也前守户部劉公珵選官治役度用賦工會王公自潤昜蘇下車三日臨視興作命之栽築填汙立基如請之素益以關賦之財助以亡命之卒完舊創新纍工逾萬期歲而告成不以一分取于民公堂廓如也廊廡翼如也齋室凡二十二而始作者十為屋總百有五十楹而初建者三之一立文正公安定先生祠宇遷校試廳于公堂之陰榜曰傳道庖池澡室莫不嚴潔窈然而深曠然而明其處也寬其容也衆南楹引愛日北牖延清風咸適其宜矣凡學田之佃于人而隱沒者為之括而實之屋之僦于市而已壞者為之新而復之養士之資由此不匱皆太守所命也夫儒者蚤暮孜孜從事典籍茍居處不佚餱糧不豐而責其勤難矣故嚴其宫足其餉所以教也且吳為東南都會自泰伯三遜天下延陵脫屣千乘言偃以學稱嚴助以文著朱張顧陸世多顯者此誠禮義之區儒雅之藪也今夫興學以教者豈徒貴其中程課躐科等哉必也為文足以貫道為經足以通理立于朝廷則謀王體贊國論仕于郡縣則宣惠澤興事功其餘風所扇猶將使人老老而幼幼夫夫而婦婦室有忠信俗有廉潔然後知新學之作豈專以棟宇為哉君子為兵部公善述其先志可謂之孝正諌公樂成于教育可謂之仁唯孝與仁于是著矣正諌公以道立朝忠貞不回其治吳期月吏民威其德而安其政晝坐郡閣事至即決已而與賓客雍容笑語沛然有餘裕方學之成吳人莫不欣悅鼓舞望車馬之來而樂芹藻之采也見命作記確辭莫獲輒系之聲詩刻之隆碣以告于後世云詩曰惟帝光宅錫民保極曷以臻兹惟孝之積降漢迄唐以經以文元臣碩老世偉其人天保神宋七聖繼德右儒尚文經緯九域肇開雍庠周設泮序興賢舉能歲幾千數維吳有學文正是興師明友諒俊傑紹登歷載五紀蒸然髦士將圯其隘士岡能止翼翼膚使繼述其先建言于朝授牒昜泉邦牧承命以新以廣匪憚厥勤資我教養高堂邃廡環闢羣齋潭潭其深濟濟其來孰居是堂勿尸厥職亶爾誠心傳道解惑凡處是齋勿嬉勿息道德淵源辭章潤色拱把之木長而參雲涓勺之水滌而流坤匪學之設惟材之成是明是翼永贊丕平賢行齋記余少時思友天下賢士而抱病退居所遇者少然亦得數人焉其後有以才業步廊廟有以風采名當世者由是自信其取友不謬也既歸吳下吳為俊英藪澤所交者多善士或愛其學問或偉其辭章或嘉其行義或奇其志氣然後取之也晚得一人曰林德祖盡仁于親可謂之孝推爵于弟可謂之友博洽慕向雄論著望韓杜真可以畏而仰也始德祖顧余于林圃之間一見躍然以喜恨相見之晚也後數年復會于吳聽其言而説玩其文而服其相期如金石相和如塤箎也或問曰子之知德祖者深矣其詳可得而聞歟曰余言非妄也德祖少而警敏生數歲其伯父今天章公嘗獲一鑑背題龍朔德祖在旁曰此唐高宗時所鑄也公中奇之他日諸父有所見問之即對皆與史合孔常父掌揚州學德祖年十七試為諸生冠會神宗初罷尊號坐客或論尊號之所起德祖避席曰宇文周宣帝生號天元唐高宗自稱天皇自是美稱寖多矣常父即取筆札命書之擢為都講辭不受元豐中試太學第一司業博士以謂三舍之置未有此作也厥後試二浙江東漕司嘗在魁選又用賦舉開封名第五而連見黜于禮部一時諸公幸得之以為功見其失也莫不驚愕嗟惜嗚呼近世以糊名取士雖曰至公其弊至于失才如此可為太息先公太僕當任子德祖以遜其弟碩孺太僕不許德祖即取奏牘以碩孺名上之會有詔任子必以長幼為之序德祖遺書諌官曰某當以廢疾自棄矣是時岑巖起仲子亦推與叔弟德祖聞之諗巖起建請乃得改法碩孺遂得入仕太僕捐館河東德祖號頓幾不勝間關扶護下太行而歸未卒哭葬吳西山所以奉終顯親之事無不自竭鄉里敬服其平居論議必以帝王之佐為師而頗喜賈誼汲黯諸葛孔明魏鄭公之為人其志可知也嘗擬作節度留後制辭其舅氏今丞相蘇公見之曰此非盡讀一部唐史不能知此也天章公當世大儒視士大夫少所許可于志太僕乃稱德祖曰好學有賢行夫仲尼獨賢顔子且嘉其好學楊子賢顔淵黔婁四皓韋成以謂為人所不能為然則賢之實豈昜許哉天章之言何敢私也余之譽德祖非過也問者曰子之言然余既答問一日過德祖遂名其所居之齋曰賢行雖德祖謙不敢受然使鄉里之士慕其賢而勉于善豈無補哉且欲當路者聞之儻以推轂人物為己任則德祖豈宜久蟠于閭巷哉遂作記云元祐癸酉三月望泮池書儒學林公祠堂記寶元中集賢校理儒學林公以大理評事知長興縣公之道德文章名震天下擢第甲等試才兹邑始時邑人懵不知學公闢庠校躬自教飭相率以從俗用丕變勸課農桑開浚甽澮凡下教令稚老歡呼政成逾年陟守于連邑人懷思生立祠宇歲久暗故又繪而新之逮元祐二年丁卯公之元子朝奉大夫集賢殿修撰公出典斯郡眷言故邑西嚮懷慕四年正月徙鎮金陵解印之初即走祠下饋羞捧奠感咽涕洟自邑大夫縣佐衆士胥吏父老百輩咸列于位退而咨嗟填道溢郛曰惟賢令君克祐我民民思不忘願見其子惟公元子復守吾土嗣其教令如公再至敬省顯考慰民之思父子相望歷載五十象賢合德以福此邦載懷載承永永無斁發于歌咏形于翰墨歡聲洋洋旁溢浙壤已事言旋次于中吳夫為政之感至于立祠秉德之報至于有後民之懷仁天之福善于是信矣公名在國史澤在黎庶有子六人既顯者四貴胄濟濟流慶無窮韡然光華孰與為嫓昔甘棠之愛相戒勿剪緇衣之敝猶願改為居則見思服則見美林氏世濟令德罔愧古人詩云惟其有之是以似之豈不休哉長城士民咸願刻石以告于後而長文居于吳下親見其事辭而記之使來者知所勸慕云是年三月甲戌長文記蔡公展先塋記代光祿作蔡氏之先世有名德著于睢陽自少保公在蜀以一城挫亂兵民不喋血太傅公雖屈卑位拯危滌寃無憚苛吏君子知其有後是生侍郎資政二公侍郎為宋甘盤壽不副德資政沈謀逺略器兼將相向者出擁帥旄料敵制勝夏戎遁死莫敢犯塞及夫運籌禁幄助新百度河隍千里復為我疆憂勞機衡疾起無妄懇祈南臺用自怡養神祐氣沖逾歲乃愈丙辰孟冬朔日維申孝思恭勤親拜先冢既獻烈考即奠元昆徘徊舊植之松柏歷覽新成之梵宇華胄詵詵以引以翼已事旋斾都人嘆美蓋公之此行榮與感并何者位至于樞廷年逾于耳順功名赫然書在史册而諸子顯仕諸孫善學朱金印組爛其盈門此衣冠之華觀至美也可不謂榮乎朝霜零空拱木飛葉莫逭蘭陔之養無復棣華之照而復朱顔昜流素髮垂領覽物興念多為陳迹臨觴引滿罕逢故人此人世之深悲永傷也可不謂感乎然公智窮物理心脫羣纍雖在間佚乃誠本朝方當蠲感慨之懷圖榮盛之報使大和內充微疚良已天錫眉壽永弼太平仰悅先公之靈俯協多士之望不亦偉哉某視太傅為外舅謹以是日同拜墓下哀念平昔喜觀盛事因書之屋壁以貽後來時熙寧九年也朝散大夫守光祿卿前知舒州軍州事兼管內勸農使上輕車都尉借紫朱公綽謹記樂圃餘藳卷六
