body:
  text: 樂圃餘藁卷七宋朱長文撰序吳郡圖經續記序方志之學先儒所重故朱贛風俗之條顧野王餘地之記賈耽十道之録稱于前史蓋聖賢不出户知天下矧居是邦而可懵于古今哉按唐六典職方氏掌天下之地圖凡地圖命郡府三年一造與版籍偕上省聖朝因之有閏年之制蓋城邑有遷改政事有損益户口有登降不可以不察也吳為古郡其圖志相傳固久自大中祥符中詔修圖經每州命官編輯而上其詳略蓋繫乎其人而諸公刋修者立類例據録而刪撮之也夫舉天下之經而修定之其文不得不簡故陳迹異聞艱于具載由祥符至今逾七十年矣其間近事未有紀述也元豐初朝請大夫臨淄晏公出守是邦公乃故相國元獻公之子好古博學世濟其美嘗顧敝廬語長文曰吳中遺事與古今文章湮落不收今欲綴緝而吾所善練定以謂唯子能為之也長文自念屏迹陋巷未嘗出庭户于訪求為艱而練君道晏公意屢見趣勉于是參考載籍探托舊聞作圖經續記三卷凡圖經已偹者不録素所未知則闕如也會晏公罷郡乃藏于家今太守朝議大夫武寧章公治郡三年以政最被命再任比因臨長文所居謂曰聞子嘗為圖經續記矣余願觀焉于是稍加潤飾繕寫以獻置諸郡府用備咨閲固可以質疑滯根利病資議論不為虛語也方聖上睿謨神烈聲教光被四海出日罔不率俾廣地開境增為郡縣儻或申命方州更定圖籍則此書庶幾有取也事有缺略猶當刋補其古今文章别為吳門總集云元豐七年九月十五日州民前許州司户參軍朱長文上圖經續記府治有本今不具載春秋通志序夫孔子何為而作春秋也所以存王道而見巳志也孔子之志堯舜禹湯文武之志也堯舜禹湯文武之志見于天下孔子之志見于春秋其揆一也昔周室東遷王綱絶紐朝覲會同之儀不修于京室禮樂征伐之柄皆出于諸侯三綱五常蕩然墜地號令無稟典法大壞周之所存位號而已更歷數世亂日以甚荆楚吳越交亂天下夫隱桓之後諸侯無王矣成襄之後大夫無諸侯矣君臣之道父子之恩至于泯沒孔子知時之不用道之不行既無以有為于當世又懼王者之法于是乎絶嘗歎曰文王既沒文不在兹乎于是因魯史而作春秋所以尊王室繩暴亂舉王綱修天常是非二百四十二年之事以為天下儀表貶諸侯討大夫以達王者之事公羊子云撥亂而反諸正是也明常典立大法褒善黜惡賢賢賤不肖不失纎介其道以堯舜為祖以文武為憲上律天時下襲水土所以治天下之術無不具在可謂聖人之極致萬世之成法也孔子既歿師説各傳而能言其要者莫如孟子孟子之言曰春秋天子之事也孔子作春秋而亂臣賊子懼推是以見扶王法以繩暴亂也又曰五霸三王之罪人也今之諸侯五伯之罪人也今之大夫今之諸侯之罪人也推是以見隱桓而下譏諸侯之無王成襄而下譏大夫之無諸侯也又曰春秋無義戰推是以見諸侯之不得專兵也又曰子噲不得與人燕子之不得受燕於子噲推是以見春秋非王命不得擅廢置也蓋孟子深于春秋惜哉其不著書也其後作傳者五而三家存焉左氏盡得諸國之史故長于敘事公榖各守師傅之説故長于解經要之互有得失漢興以來瓌望碩儒各信所習董仲舒平津侯治公羊而公羊之學施于朝廷孝宣帝劉向好榖梁而榖梁之義顯于石渠劉歆賈逵之徒好左氏而左氏之傳列于學宫是非紛錯凖則靡定誠君子之所嘆息也其秉毫牘焦思慮以為論注疏説者百千人矣攻訐毁訾黨同斥異恬不知怪范寧解榖梁略言三家得失故文中子謂使范寧不盡美于春秋歆向之罪也唐儒啖助始作三傳集解趙伯循又為之損益陸淳會稡其説作纂例辨疑微指之類取其長而棄其短撮其是而刪其非又頗益以己説由是春秋之學初得會通學者賴焉本朝孫明復隱泰山三十年作尊王發微據經推法洞究終始不取三傳獨析諸聖人之言明諸侯大夫功罪得于經之本指為多慶厯中仁宗皇帝鋭意圖治以庠序為教化之本于是興崇太學首善天下乃起石守道于徂徠召孫明復于泰山之陽皆主講席明復以春秋守道以昜學士大夫翕然向風先經術而後華藻既而守道捐館明復坐事去國至和中復與胡翼之並為國子監直講翼之講昜更直一日長文年在志學好治三傳略究得失日造二先生講舍授兩經大義于春秋尤勤未幾明復以病居家雖不得卒業而緒餘精義不敢忘廢頗欲著書以輔翼其説而嬰疾弗遑也熙寧中王荆公秉政以詩書昜禮取天下士置春秋不用蓋病三家之説紛糾而難辨也由是學者皆不復治此經獨余于憂患顛沛之間猶志于是會元祐初詔復立于學宫而余被命掌教吳門于是首講大經以授學者兼取三傳而折衷其是旁考啖趙陸淳諸家之義而推演明復之言頗繫之以自得之説不二歲講終獲麟紹聖初被召為太學博士復講此經乃裒其所録次為二十卷名之曰通志使學者由之可以見聖人之道如破荆榛而瞻門庭披雲霧而觀日月也異日立朝端斷國論立憲章施政教可推其本旨而達于行事豈小補哉古之為師者以講解為職故能傳道而解惑而從學者以聽授為業故能立身而揚名若夫務規矩之末而倦于講解守簡編之義而忽于聽授其何以繼前哲之用意哉余所以早夜孜孜探討大經之意亦求稱其職而已紹聖元年正月日序閲古叢編序古之聖賢有三立上曰德次曰功次曰言得其一可以名天下猶謂其傳之不逺也于是託之于物物之久者莫如金石故可以寓焉吉日之題岐陽之鼓比干之墓正考父仲山甫之鼎後世類有傳焉嬴秦震矜厥勳勒泰山鑱鄒嶧剟之罘刋會稽自以謂三代莫已若而人弗信也西漢陋秦之為雖封嶽省方未嘗刻石而羣公庶士若蕭相國善篆張京兆古文不聞鐫鏤者逮于東京碑祠始作碑者古之葬祭之一器也葬以繞紼祭以繫牲而宫中亦有碑説者云所以識日景測隂陽也古者用大木穴其上以便于用後世賢者昜之以石觀漢碑上亦有穴此其遺像也既昜以石于是假以銘焉楊震劉寬之髙爵郭林宗陳太邱之潛德宣父老子華嶽之廟皆因碑以製文焉由是貴賤競作美詞相誇寖繁于魏晉而尤盛于隋唐或矜已以耀世或褒親以垂後或譽天以求福或記事以謹時不可勝言矣雖所述艱于盡信而事有可考文有可師迹有可法至于羣經衆篇妙札竒帖往往傳于琬琰者甚衆是以學者務觀焉然不幸為干戈之所蹂躪風霜之所摧剝或因時主之所詔毁或遭野叟之所殘斫其存者蓋十一焉亦可為之歎息也余少也學古凡古人之文無不求而讀之又從而藏之好其書如其文也古書之載于紙墨者幾希而存于金石者類在于故都之外四方之逺與夫山林墟墓之間唯勢位赫赫衆所翕附而好之甚篤者為能多置也余以疾退隱迹與世逺雖欲致之豈不艱哉顧嗜此為癖早夜不捨所逰必問所居必求丐于交遊購于市里不憚勞費月增歲積自周穆王以來下歷秦漢魏晉隋唐至于本朝諸公之迹莫不皆有于是裒精撮竒刀筆在手字剪行綴不失舊文有册有軸悉隨其宜斯亦勤矣裒而次之名曰閲古叢編蓋不獨取其墨妙亦將以廣前代之異聞正舊史缺遺也其書不以世次為其編之未已也古刻之石若其卷第載之目録其詩之可評事之可辨言之可述為之題跋于後又録焉蓋墨本昜朽而詞章可傳也或謂余曰古之好古者聚道今之好古者聚物碑亦物也何其聚之多余解之曰人情固未免有好觀其所好何如耳金犀在籝珠玉在堂良疇連阡華宇并疆吾所未嘗好也美食方丈旨酒千鍾貪餮自安沉湎無窮吾所未嘗好也妖妍悅目淫蛙亂耳秦筝羌笛齊紈蜀綺吾所未嘗好也放情嬉遊爭勝博奕白日孜孜從事無益吾所未嘗好也吾于四者忽之若遺而能韞櫝六書之妙迹網羅千載之遺文庸何傷乎乃書石刻之所興與其所好為之序琴史序琴之為器起于上皇之世後聖承承益加潤飾其材則鍾山水之靈氣其制則備律吕之殊用可以包天地萬物之聲可以考民物治亂之兆是謂八音之輿衆樂之統也自伏羲作琴而樂由此興女媧氏之笙篁朱襄氏之瑟葛天氏之八闋陰康氏之舞伊耆氏之土鼓簣桴葦籥源源以流黃帝作咸池少皥作太淵帝嚳作六英堯之大章舜之九韶皆資琴以成樂三代之盛此為重焉周官大司樂闕奏之宗廟也關雎之詩云窈窕淑女琴瑟友之施之房中也鹿鳴之詩云我有嘉賔鼓瑟鼓琴作之朝廷也禮云春誦夏絃太師詔之教之庠序也士無故不徹琴瑟施之閨門也故奏之宗廟則祖考來格用之房中則后妃和順作之朝廷則君臣恭肅教之庠序則俊造成德施之閨門則長幼咸序是以動蕩血脈通流精神充養行義防去浮佚至于移風昜俗遷善逺罪而不知者琴之德也故古之君子未嘗不知琴也達則推其和以兼濟天下窮則寓其志以獨善一躬其操弄遺名或傳于今孔子既沒下逮戰國禮樂廢缺人忘其學寖及漢唐之間薦紳士大夫不以樂為事間有賢智異能之士超然逺覽得意于徽絃之間載在前史班班可述後之君子宜為之裒次而褒顯也余經術之暇每願學焉而病故相仍是以未就嘗謂書畫之事古人猶多編述而琴獨未備竊用慨然因疏其所記作琴史方當朝廷成太平之功謂宜制作禮樂比隆商周則是書也豈為虛文而已元豐七年正月序題辭虎邱唱和題辭虎邱之景蓋有三絶望山之形不越岡陵而登之者見層峯峭壁勢足千仞一絶也近臨郛郭矗起原隰旁無連屬萬景都會西聨穹窿北亘海虞震湖滄洲雲氣出沒廓然四顧指掌千里二絶也劔池泓渟徹海浸雲不盈不虛終古湛湛三絶也兼是絶景冠以浮屠僧舍精廬重樓飛閣崎礒崚嶒梯巖架壑東南之勝罕出其右故自晉唐至于聖朝儒先文士宗工逸客風什相繼比嘗集録吳郡詩得虎邱之作七十餘篇其遺落而失傳者又可勝道哉左丞河東蒲公自杭帥鄆弭節閶扉一登此山坐小吳會歎賞不已形于詠歌于是樞密豫章章公使君劉公通守王公欣聞嘉製屬而和之觀夫思與境會情以辭宣髙義薄雲霞正聲合鐘律足以為海涌之榮觀中吳之美實也長老先禪師喜於見賜而懼其失傳願刋翠珉以託不朽使顔李大句劉白髙風不專美于是山矣蒲公又有六詠刻之他石云元祐三年四月蘇州州學教授朱長文題并書樂圃餘藁卷七
