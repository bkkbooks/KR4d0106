body:
  text: 樂圃餘藁卷八宋朱長文撰啓謝除祕書省正字啓講論璧水徒愧素餐校正蘭臺誤叨清選寵逾望表感溢情涯竊以東壁垂文肇見于乾象西昆闢宇回鎮于坤靈龍馬出而八卦分皇䇿與而六書作神明之賾形於字道德之奧發于辭紹厥后王寶為丕訓周官致治建良史以司典墳漢世尚文命儒臣而志疏略觀載籍之興替係吾道之汙隆自昔則然于斯為盛國家鼎新儒館賁飾人文矗層搆於中央裒逸書于寰海簡編森列籖軸充盈粵自興國咸平之時稍復貞觀開元之日于是旁求俊哲典校篇章以大雅宏達之高材加往行前言之博識切磋琢磨而各懋所養優遊泮渙而用待有成德茂然後位高材顯然後器使雖石渠天祿之所召道山瀛海之為榮較其得士之多未若本朝之盛於皇神考訓迪治官即舊宇之崇文正新名之中祕簡厥有常則其選益慎罷其在外則于實不浮合堯舜稽古之用心繼祖宗養賢之盛意凡任是職實難其材矧當上聖之緝熙循用元豐之典則臺閣是重賢能並升人抱連城之珍家儲照乘之寶舉之匪昜得者幾希如某者朴樕常材支離朽質生逢華旦早預俊遊策名偶入於彀中養志久從于膝下當其行有餘力必也記之空言賦就兩都竊比班張之作例通三傳深明啖陸之遺奄畢內艱歸休故里效尚平之畢嫁希仲子之灌園利不謀躬隱將絶俗臯橋棲遁猶愧伯鸞之高笠澤行歌僅同魯望之散親族共嗟其皓首交朋半處于青雲顧環堵之屢空就泮宫之特起學素專于六藝道期授于諸生説或解頥講毋倚席豈當師範幸有朋來開其聰明率以忠信沗上庠之承乏逢紹聖之作新林然英豪戾止都邑如衆羽之附丹鳯若飛雲之從應龍幸聨郡儒敬奉成法有仲舒下帷之業庶幾折衷于大經無韓愈進學之篇何以見憐于當路疲痍多疾迂闊少通序難綴于鵷鸞聲想聞于猿鶴屢丏江鄉之便敢期省閣之遊辭恐近名受慙非據雖未能掃山中之塵榻而幸得觀天下之竒書入紫府而窺琅函登神仙而望金闕少懷鉛槧行泛煙波蜩鷃低飛敢與鯤鵬而並處麏麚逺去難隨驥騄以爭驅揆趣尚之已然荷甄收而非稱此蓋伏遇某官權衡時論品藻人材進賢不以遐遺樂善猶于已有矜其無求于仕宦察其有志于藝文特加奬稱俾承優渥敢不慎其所素履探其所未聞校讎當及于闕文條撮稍增于著録迹留藏室雖勉企于古人心寄釣臺尚可收于晚節代太守林和中到任謝執政啓平章太師折獄致刑早誤提綱之選承流宣化尚叨分竹之行自視闕然何以稱此伏念某鉛黃學淺塵露效微每希匠墨之不欺尤恥囊錐之自見一昨﨑嶇嶺表玷冒使華歎補報之未聞駭謗非之已至雖多言可畏幾成息壤之疑然公議自明果免羽山之殛涵容寬典臨蒞小邦足以庇身豈敢忘德此蓋伏遇平章太師功業滿天下聲名高古人出入將相之榮薦歷師保之重儀刑百辟輔導兩宫繄盛事之所傳皆曠代之未覩俾耆而艾寧資緑野之遊式舞且歌永慰蒼生之望顧兹迂拙亦被寵臨某敢不益勵素修身圖後效庶幾犬馬之力少酬陶冶之恩感懼所深敘陳罔既平章司空平章司空靜一不變從容以和韋氏之傳一經家存素範伊陟之格上帝世濟元勳仰成百姓之昭明坐見三公之燮理顧惟鄙野玷在陶鈞誓堅逺到之心圖報太公之賜其於感戴實倍等倫僕射門下相公僕射門下相公權衡庶品陶冶萬微挺山甫將明之才養孟軻剛大之氣丙魏之于西漢克振厥聲房杜之在右唐孰覩其迹光昭可久之德隆搆太平之基在某何知受賜為大謹當宣愷悌之化導中和之風庶幾有成免為無補其于感懼曷究敘陳僕射中書相公僕射中書相公柔嘉而剛正淵靜而髙明挺尹陟格天之才蹈臯夔濟世之美夷險一節勤勞百為廟堂登賢不旬月而克至海宇仰德豈已日而乃孚激昂多士之心鼓舞羣生之類顧惟闒茸亦在甄收某敢不席石存誠氷霜思畏勉圖菲效仰答巨恩竊倍感銘曷伸悃愊樞密相公樞密相公徽猷經逺懿德蹈中仰成廊廟之機坐消兵革之氣陶鈞所逮動植曲成如某何知蒙賜為厚方秪官守阻拜賔閎感懼所深敘陳罔罄門下侍郎中書侍郎左右丞門下侍郎中書侍郎左右丞當裁成輔相之休運挺燮理寅亮之全能舜舉臯陶蓋咸事者九德湯得伊尹無不獲之一夫某慙非共理之良報在大公之辱方秪吏役正逺台躔惟堅報稱之心以示感銘之素律賦樂在人和不在音賦以聖人治民情以作樂為韻盛德興樂至和本人不在八音之制蓋由萬化之純既備情文用寫歡心之極豈專聲律誠非末節之因竊原樂與天同音由人起蓋喜怒哀樂既怵于外而噍嘽散厲遂形于此惟聖人圖化俗而有作慎感民之所以積中發外必資悅豫之深昜俗移風非特鏗鏘之美于時神武外震烈文內宣躋八荒于壽域陶萬彚于仁天于是制以雅頌播之管絃既乘時而更制唯探本以相沿順氣正聲為羣情之影響黃鐘大呂乃至理之蹄筌羽毛干戚兮是謂繁文管籥鐘鼓兮孰稱至樂惟羣元咸得其情性而雅奏密調于商角理出自然識歸先覺四時當而天地順既效緝熙百姓樂而金石諧未論清濁且夫不偽者惟樂可畏者惟民聽暴君之作則蹙額而多懼聞治世之奏則抃躍以歸仁匪聲音之異道蓋憂樂以殊倫是以鼓清角于晉邦曽遭旱暵歌後庭于唐室誰復悲辛是以興替關時盛衰在政桑濮非能致亂也亂先起于淫僻英莖非能致治也治必逢于睿聖未有功成而樂乃不作未有民困而音能自正荀公嘗定于新律終貽晉室之憂鄭譯雖考于舊音曷救隋人之病噫莫備乎二帝之闕樂莫隆于三代之仁聲庶尹允諧兮聽其擊拊嘉客夷懌兮感其和平小則草木之繁膴大則穹壤之充盈非皎繹之能及實歡欣之所成舜廟笙鏞鳯有來儀之應周庭簨簴民懷始附之情異哉樂出于和而還以審政之和音生于樂而復以導民之樂逮王道之既逺嘆古風之寖薄絳灌搆害而孝文之議遂寢房杜未備而貞觀之時不作幸逢聖代之緝熙繼有名臣之咨度揆太府之尺以為之度纍上黨之黍以為之籥推樂本之先立感輿情而咸若上方乘百年之極治而集六聖之睿謨臣請告成于簫勺樂圃餘藁卷八
