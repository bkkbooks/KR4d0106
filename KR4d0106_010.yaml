body:
  text: 樂圃餘藁卷十宋朱長文撰墓志宋故將仕郎試祕書省校書郎守湖州歸安縣主簿蔡君墓志銘君諱昕字景叔世為宋人曾大父贈太子太傅諱陟以吏能仕章聖時大父贈太師諱希言位卑守正慶流厥家是生秦州密直公資政敏肅公有七子君生最先少時率其弟四人者共學而材藝相比雖塤箎同音蘭玉並秀不足以喻也君資宇端深動作有度事親至勤與人交和而信少工屬文年甫十三有盛集賓客而召君者君于石上賦詩援筆立成闔坐嘆其清警尤長于賦磨礪鐫切瑩然無瑕密直公精教子姪每閲君文未嘗不稱善君益自勉進視時輩莫出己右既而程文屢冠太學聲滿都邑擢嘉祐六年進士第與其弟君弼如晦為同年生景祐中敏肅公兄弟三人聯榜至是復繼其美密直公時在館閣拜恩上前館中諸公作詩為慶搢紳歆慕之君嘗固辭父廕以官其弟後數歲乃登科焉調湖州歸安縣主簿事敏而達太守張田及沈杭州遘皆器其為人湖學盛于東南久矣郡命君掌之且不欲縻以簿書也君誨誘不倦而士樂從之學連舉得人當路交薦君才代還道病終于楚州旅次享年三十有六時治平三年二月三日也弟如晦勝道馳至楚挈柩以歸視其室唯有琴書而已其後敏肅公帥慶渭有大勳烈以為時樞臣而浚明諸弟顯于朝持節諸路使加君以壽豈不能自致于青雲哉君以妣王氏早亡未及封邑為恨自敏肅公歷使外臺冀有追榮之請而有司前無此比及公大用奏于殿中詔特封南陽郡夫人又改封太原顧君不及見之哀哉君娶田氏初太原夫人嘗約以婚久之其家微弱不聞問或欲為之議于他族君曰義不違慈母志必娶焉及嫠居哀毁沈頓自誓靡他以教二子長曰歆守祕書省校書郎監鄜州酒稅次曰韶為進士以元豐二年八月初二日葬君于宋城縣七里村先塋之側某于君為內弟昔被博約於銘宜無避銘曰瞻彼高山有柟有梓烈烈敏肅生此良士事公于早既勤且才公始顯大子喪而哀維學孜孜維德懋懋奄不一施戚友之疚梁城陂陀從葬其北我思若人播名幽石宋故將仕郎守祕書省正字蔡君墓志銘君諱欽字承辟樞密直學士知秦州蔡公之子也秦州晚始有子君為之次頎秀娟整雖襁褓人固以為佳兒七歲而孤以恩授祕書省正字其兄如晦為之教育而君能承其訓好學善為詩日與諸兄姪並遊羣而能靜裕而能約其趣習操守有可奇者雖抱羸瘠讀書自力其兄震仲頃嘗疾甚君晝夜不解帶藥劑飲食嘗而進燔香于其頂臂以為祝俄而有瘳未幾震仲親迎親湖外而君病作且亟于死生之際若無所動而獨以不見震仲為戚戚乃作三篇遺焉以元豐元年二月二十九日卒年十有九蔡氏世家睢陽曽祖諱陟國子博士贈太保祖希言泗州軍事推官贈太師秦州公諱抗為英廟舊學之臣特見信重贈禮部侍郎母曰會昌縣君張氏聰明而仁族姻推賢嘉祐中卒君未娶而歿後一年八月二日葬睢陽城北先塋次某高其行而悲其夭叙文刻墓又辭而哀之因以為銘曰謂明智宜在高位兮有不幸而窮約謂孝悌宜永年兮有在幼而凋落自古嘆息其然兮嗟神聖之難度猗吾子之禀生兮居高門之顯大茁蘭畹之芳芽兮煒棣華之秀彩躬欒棘于髫年兮服天倫之善誨既柔嘉以飭已兮亦方靜而樂內至行可以通神兮胡不延之秀眉奄遺辭而正命兮亶修短之不移仲父臨喪而摧慟兮諸兄欲語而涕洟衛玠不及壯齒兮童烏促于九齡已矣宅此嘉瓌兮庶有存乎令名宋故宣德郎守尚書屯田員外郎知永康軍青城縣贈尚書都官郎中蔡公墓志銘代光祿作天聖中范文正公講學于南都四方英才踵門受教睢渙之上實為淵源是時蔡氏有四賢焉君其長也子清其弟也故秦州密直公今資政南陽公其從父弟也余以勤苦獲交于四賢之間而君之叔父太傅公以其子妻余由是相與甚厚及既從仕離羣索居久矣而君不幸沒于中年君之子無一存者風迹之美人罕知之于其將葬也南陽公囑余以銘余安敢辭姑述其世閥官資與其所聞之美行以志諸幽君諱拯字仲仁應天府下邑人也曽祖諱堅潛德儲慶以南陽公貴贈太子太保妣曰陳氏慶國太夫人祖諱陟位國子博士知泗州體用强明為世吏師贈太子太傅妣曰張氏康國太夫人考諱希顔殿中丞治邑稱惠以君貴贈尚書祠部員外郎妣曰謝氏永昌縣太君蔡氏世稱經術而吾外舅酷愛進士以教諸子君孝友明悟强學勇進足以充其科初雖黜而業益工尤善為律詩琢詞練意得唐人之清學中翕然稱誦焉景祐元年試于廷賦等幾中魁甲以脫誤才得及第與子清及南陽公為同年拜慶于家鄉黨歆慕君子喜蔡氏之興焉初命德清軍判官以廉辨聞河北轉運使李統舉監倉草場于天雄軍庾廥無弊薦牘交上改大理寺丞知下邳縣屬家艱解職又宰并州之平晉徐州之沛三司使才之舉勾當北作坊遷殿中丞太常博士出知永康軍之青城縣又改屯田員外郎卒于官年五十七皇祐六年十月九日也以子官贈尚書都官郎中君少時名聲籍籍在人口自郡縣以至列于朝風力遒徑所臨必最其為人軒闢磊落洞去闕事可為無少憚也于朋友直而不隱親善謔以發其歡心人莫不欣欣願交焉太常博士沈唐頃在楚州幕與州將有隙因致于罪君時過楚聞其狀即以書訊于大理少卿王告告怒以進坐是齟齬纍年嗚呼世俗之友閒居或煦煦相親囁嚅諂笑惟懼不合一有急難則棄不之省若秦越相視肥瘠者多矣如君能蹈危以救其友論者高之君之所為皆倣是當世名公卿或器待之然君不亟于進趨也俾其克壽未必不顯而止于此哀哉自子清終于建州推官又逝去而秦州為英廟舊學之臣貴重于世南陽公秉鉞殪戎致位樞府英胄聯進咸見器使天下以蔡氏為華族而君與子清不及見也夫人李氏封萬年縣太君居家整整有法度方君之喪人皆以道逺欲火之獨為不可力護全柩自蜀歸宋後五年卒三子長曰天經淄川高苑縣主簿次天球都官員外郎次闕不仕二女長適國子監直講楊褒次適著作佐郎劉瓌今皆亡矣孫男曰從曰復孫女三人睦州巡檢張從愈橫海軍節度推官凌浩進士張充其壻也嗟乎君亡逾二十年祗見其孫從頗善學庶幾有後南陽公嘗讀君之遺編乃慨然作詩曰一孫身後立百紙死前書痛之深也以熙寧十年五月二十三日合葬君夫人于宋城縣之三里村銘曰浩浩蔡源既浚且長方宋之隆繼才萃良濟濟四賢從師于庠君倡厥倫有蔚其章亦既起家謂宜聯仕不銼其剛不懾于義滯淹即潛用未盈器死于岷陽疇不嗟欷君亡二紀子喪孫孤昔時流輩零星邱墟棣存一萼嘗運天樞是友是懷涕泗盈裾睢陽北原岡陵迤邐壞沃水深祖考則邇既吉其藏貽後之祉勒銘于幽庸示來世宋故將仕郎試祕書省校書郎守淄川高苑縣主簿蔡君墓志銘代光祿作資政殿學士南陽蔡公以其從兄之子天經文編與其子從所書行狀畀豫且曰天聖中吾與君學于睢陽天經已頎然于前矣其後僅二十年遂登第後三年不幸早死吾甚傷之今其孤從將卜葬焉請為之銘以攄吾懷豫竊謂南陽公洵友且慈既悼其兄又閔其子將以文辭賁于窀穸安得無述焉君字元愷天經其名也贈太子太傅諱陟之曾孫也贈祠部員外郎諱希顔之孫屯田員外郎諱拯之子蔡氏世為睢陽人持家修嚴鄉黨矜式自祠部與其弟贈太傅府君教諸子為辭章舉進士遂以起家而屯田亦善教其子君既聞誨于父又受學于師弱冠時嶄然出羣試文府庠嘗為諸生冠慶厯六年以鄉薦覆試武成王廟名在第二是年登科當時士子翕然慕其文以試校書郎守淄州高苑主簿年少仕初與大夫辨正枉直惟其是而後已鄰境有河每役夫爭渡或挾仇怨以至溺死及君總役將罷先期告民度舟之力以次為渡且戒舟人曰有溺死者必刑是日坐于水濱俟其皆濟然後去以無患會歲饑勸民出粟以賑貧他邑納粟于縣而後給君獨請各輸于其村之富室立期遣官就發焉富者不勞而餓者以活時大丞相富公安撫青齊嘉君之為每謁府慰待甚渥方將薦之而君以疾卒于官時皇祐元年四月九日也享年二十有八君資孝友而倜儻有節志大而氣豪邁美才局于短數悲夫自屯田昆弟四人擢進士第君能嗣之其弟天球又繼之其後南陽公有才子數人而三人又為同年光焰暐暐縉紳榮之而君亡久矣娶劉氏虞部員外郎說之女秉節自誓以育其子子二人長即從次景修天喪女適睦州巡檢張從愈孫男尚幼熙寧十年五月二十三日從奉君之柩葬于宋城三里村先人之墓次銘曰凡物之生或華而昜稿或質而難老吁嗟之子夙敏而成早胡齡之夭自旅而歸終安其兆維後人之孝宋故汝南郡夫人王氏墓志銘代光祿作資政殿學士右諌議大夫南陽蔡公在治平熙寧中以經略使治慶守渭禦戎有大勳天子嘉之召拜樞密副使一日奏事上前延問甚渥遂及其私乃請曰臣幸得備位右府臣之考妣若妻皆被褒贈獨亡妻王氏實與臣同在寒苦格于彛例寵典未及臣竊傷悼惟陛下憐之天子曰俞有司其封之于是有詔以南陽夫人告第實熙寧五年六月也其後郊祀霑恩纍封太原汝南郡夫人先是夫人葬于先太師之墓側十年夏五月壬申改葬大塋之西原與繼室睢陽夫人同兆域縣曰宋城村曰三里先期使來速銘某謂夫人佑德娠才以成其君子以衍其後昆實有休烈于蔡氏是宜銘按王氏之先原祈人也其七世祖徙家虞城遂居睢陽曾大夫諱化追位太傅太傅生屯田郎中諱礪贈太師中書令兼尚書令太師生禮部侍郎諱渙贈工部尚書夫人侍郎之子也頎秀端淑齊誠敏工而天資孝幼時其從父妹失乳夫人親為之哺妹以獲安皇考甚異之求可以妻者時南陽公才數齡警悟絶倫侍郎遇于里巷一見奇之許以逺到故夫人歸于公歸之年夫人既笄南陽公猶未冠也當是時王氏寖以顯盛才如伯庸文如原叔遝進聯起而夫人之舅太師公為譙縣主簿官微節廉以貧自樂英髦雖衆學而未仕夫人既歸事舅姑婉婉聽命不翅寒女衛國太夫人常愛而賢之其友姒婦待族姻無一不得其歡心者余之亡室南陽公之姊也與夫人尤相厚嘗謂余曰王氏女至孝而和其待我也如其姑真賢婦也南陽公抱藝决科調䖍州從事夫人以衛國治家之法治其閨門檢柅肅嚴而承順于公以勸以適南陽公至今思之曰夫人助我多矣太師授益州觀察推官南陽公曰大人將老而逺涉蜀道吾不忍親勞而已逸也乃請代行得陵州推官然公及夫人猶以辭顔為戚戚乃留一子以娛悅左右時天申未離乳保而夫人能以義割愛曽不留吝聞者舉以為難道途間關淹歷寒暑夫人感疾於途比至陵益甚自度不起謂南陽公曰女子有行沒于異方命也妾有從父妹實賢可以繼成臺事拊育四子君其念之且聞死于蜀者多不能以柩還而從浮屠氏之法今君官小力薄奈何茍得全父母遺體以歸夫復何恨享年二十有六以景祐五年五月十六日終于官舍其子之長者九歲幼者未晬也南陽公悼之及奔太師之喪竭其所有護柩還鄉卒窆先隴蓋深念于平生而不欺于逝者陰德之報不亦逺乎久之南陽公再婚于王氏實夫人幼時所哺妹也終以溫惠用宜厥家封曰睢陽夫人二人者幼而相友長而同歸蔡氏由是以大豈偶然也歟夫人未嫁時其家嘗出諸女使相者視之相者指夫人及睢陽夫人曰是皆當為夫人然姊也夭妹也壽以今觀之太原既沒而封延安生享其貴亦可信云王氏諸女無慮三十人多衰謝不振其封夫人者特此二人而已南陽公既拜賜退與諸子諸婦慶慰于家族中以為榮夫人之子長曰昕次曰朦次曰天申次曰華皆有學問才藝朦最先仕而昕天申華為嘉祐六年同進士第其後昕終于歸安主簿天申終于殿中丞河北東路轉運判官今朦為贊善大夫京東東路轉運判官華以太常丞直集賢院副廣南西路轉運率能奮其事業為時所器有子曰堪為太常寺太祝繼以才仕曰穀守將作監主簿曰修尚幼有女五其嫁于士大夫者三人諸孫凡十七人曰今將安持夷直安時秉蕃禾式方乘元紘厚孚彥昭餘未名安持守祕書省校書郎秉蕃並為守將作監主簿孫女一人適趙伯通為穎川司户嗚呼夫人鍾愛于父而不見其大耋盡孝其姑而不終其奉養姤賢夫于窮約而不享其貴盛生才子于弱齡而不逮其成立此亦人生之至悲而永傷也然存有淑譽沒有殊贈福嬴子孫既逺愈彰先民有云死而不朽孰謂之夭夫人其不朽者歟昔莊姜之賢韓姞之譽列于風雅萬世是稱謹述銘詩以贊汝南之德寫南陽之悲慰嗣子之孝銘曰民之伉儷猶非偶然陰定默受孰曰非天賚時良㢸宜配之賢伊王與蔡號宋名族奇公于幼匪媒匪卜志合年均豫才爾淑惟孝與悌生則有之移于夫氏疇不謂宜擺棄華靡循規蹈矩士曰承家女曰進德內則既修外治乃飾國器以培豈無助力子勞父逸公為蜀官懷姑之養泣涕汍瀾留嬰于抱以悅以安碩人其頎躬不䝉耻呱呱四男或乳或稚疇克母之有齊其季月缺復盈四十其齡愷悌君子纍功享榮登陛伏奏追寵泉扃天子有命高風顯號式慰且傷涕零訓誥曷惟龍光庸起風教藹藹俊德在宋之廷實蕃且碩維葉青青胚祥胎慶愈逺愈明窆之封之既崇且厚泗水有窮蔡宗益茂百世是稱太原賢婦樂圃餘藳卷十
