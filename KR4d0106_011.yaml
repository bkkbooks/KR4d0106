body:
  text: 樂圃餘藁附録墓志銘張景修樂圃先生朱伯原卒於京師識與不識者皆歎之先生故人自玉堂青瑣與夫一時賢士大夫多挽之以詩先生妙齡登乙科以疾求間學且養踰三十年特起為蘇州教授歷五考召為太學博士改宣德郎除祕書省正字兼樞密院編修文字先生文章前宰相范公今宰相章公嘗薦其典麗可備著述矣先生行義中書侍郎許公嘗薦其純固可為師表矣先生博聞強識篤學力行樞密林公允除禮部侍郎及寶文閣直學士嘗薦自代矣前後薦者蓋不可殫數謂宜得名公巨儒志其墓而諸孤乃以其季父明州象山縣尉仲方之狀屬豫銘豫豈足以知先生耶按先生家譜昔髙辛氏有才子曰朱虎先生其後也先生諱長文伯原字也其先為越州剡人自其祖居蘇者三世曾祖諱瓊仕錢氏祖諱億始入朝太宗皇帝召對便殿命以官數有功遷內殿崇班閣門祗候知雍州纍贈刑部尚書考諱公綽光祿卿知舒州為時名儒妣蔡氏封宣城郡君所生周夫人方娠夢覆錦衾或謂光祿公曰生子能文必矣先生果幼而不群光祿器之十歲善屬文讀書輒終夜光祿公命徹燭先生侍其寢不徹也泰山孫明復講春秋于太學往從之明復韙焉先生書無所不知尤深于春秋擢嘉祐四年進士第吏部限年未即用時光祿公守彭先生不俟宴歸州人榮之既冠除祕書省校書郎守許州司戶參軍誥有美辭先生無他疾苐傷足不果仕非行怪而固隱也郊禋光祿公欲以任子恩丐先生幕官先生推與其季弟光祿公拊之曰兄以官畀汝因名之曰從悌先生逮光祿公捐館左右凡二十年以孝稱居喪如禮服除人勸以仕無意也撫弟妹畢婚嫁安貧樂道因舊圃葺臺榭池沼竹石花木有幽人之趣州侯貴客山翁野叟或觴或詠去則醉臥便腹不知身世之在城郭也太守章公伯望表其所居為樂圃坊鄉人相與尊之稱樂圃先生當是時也使東南者以不薦先生為恥遊吳郡者以不見先生為恨左丞鄧公先在翰林與給事胡公孫公中書舍人范公蘇公列薦先生于朝先生不得已起典鄉校州有兩教授以先生故也同時徐積舉于楚陳烈舉于福世號三先生先生之教人先經術而後華藻曩歲作東都賦自視不減班張太沖輩前宰相蘇公嘗薦先生曰稱述歷代京邑之盛莫如國家汴都之美深有可觀焉客有使之獻者先生曰此吾少時也今老矣尚何賦為哉講春秋洪範中庸學者無慮數百蘇學范文正公建也歲久隳甚其子侍郎公時領大漕得請修葺先生有力焉吳中水災先生陳五浦之利郡不克行逮右丞公之守是邦先生作救荒議四篇以獻黃公從之民賴以安其仁心類如此晚遊辟雍著釋問以見意後罷春秋博士亦頗有歸志想聞猿鶴數請還鄉內相蔣公詩曰玉杯舊學無施設空有新詩滿錦囊蓋歎之也暨登藝省有喜色嘗曰天下奇書在吾目中矣明年樞密曾公林公薦兼尚書局未期月以疾終于家命夫實元符元年二月十七日丙申也享年六十家徒四壁大臣以聞賜縑百喪歸吳人迎于境上行路為之流涕先生天資忠朴有致君澤民之志不少見于用中年仕宦先疇悉委諸弟所同者一圃藏書二萬卷且曰以此遺子孫不賢于多財者乎遺以財是教之為利也遺以書是教之為學也可不慎歟著書三百卷六經皆有辨説樂圃有集琴臺有志吳郡圖經有續記作詩雅馴得古風及類古今章句為吳門總集以備史官采録善書有顏魯公體藏碑刻自周穆王始至于本朝諸名公帖皆有之作墨池閲古二編嘗謂書畫事昔人猶多編述而琴獨未備元豐中作琴史其敘曰方當朝廷制禮作樂比隆商周則是書也豈虛文哉今太常少卿曽孫為之後序亦曰琴史之作固有志乎明道而待時之用者也元符己卯果詔太常按協雅樂命前信州司法參軍吳良輔政造琴瑟教習登歌惜乎先生不及見斯時也娶張氏三子耜前婺州東陽縣主簿耦改名發耕舉進士皆有文行一女未嫁孫男曰愈以元符元年六月乙酉葬先生于吳縣至德鄉南峯山之西從先塋也銘曰先生之樂非玉非金室則有書几則有琴出而不返猿哀鶴吟壁水師筵蘭臺儒館末如命何丹旐云逺吳山迎喪學者大半有丘有園有子有孫清白傳家孝友盈門我銘永久南峯之原墓表米芾樂圃先生吳郡朱氏名長文字伯原光祿公之子十九歲登乙科病足不肯從吏趨築室居郡樂圃坊有山林趣著書閲古樂堯舜道久之名稱藹然一邦嚮服郡守監司莫不造請謀政所急士大夫過者必奔走樂圃以後為恥名動京師公卿薦以自代者甚衆天子賢之起為本郡教授以為未廣也起為太學先生以道授多士未幾擢東觀仍兼樞府屬元符元年二月丙申搆疾不祿享年六十子耜杭州鹽官尉耦耕舉進士以六月葬至德鄉從光祿之塋先生道廣不疵短人人亦樂趨先生勢不在人上而人不敢議蓋見之如麟鳯焉方擢欲使大施設而命不假朝野惜之著書三百卷六經有辨説樂圃有集琴臺有志吳郡有續記又著琴史其序略曰方朝廷成太平之功制禮作樂以比隆商周是書也豈虛文哉此先生志也至于詩書文藝之學莫不騷雅造古死之日家徒藏書二萬卷天子知其清特賜縑百匹嗚呼先生可謂清賢矣余昔居郡與先生遊知先生者也表曰窮達有命出處有時司出處者非命而誰時與命違士能不出出而無命孰諗於時升公之堂理公朱絲清音不改樂圃堪悲嗚呼哀哉劄子元祐元年六月二十五日朝奉郎試中書舍人蘇軾同鄧溫伯胡宗愈孫覺范百祿等劄子奏臣等伏見前許州司户參軍蘇州居住朱長文經明行修嘉祐四年乙科登第墮馬傷足隱居不仕僅三十年不以勢利動其心不以窮約昜其介安貧樂道闔門著書孝友之誠風動閭里亷髙之行著于東南本路監司本州長吏前後纍奏稱其士行經術乞朝廷旌擢差充蘇州州學教授未蒙施行近奉詔中外臣僚自監察御史已上並舉堪充內外學官二人此實朝廷博求人才廣育士類之意如長文者誠不可多得其人行年五十餘昔苦足疾今亦能履臣等欲望聖慈褒難進之節收久廢之材量能而使之特賜就差充蘇州州學教授非惟祿餼賙養一鄉之善士實使道義模範彼州之秀民取進止國史文苑傳朱長文字伯原蘇州吳人年未冠舉進士乙科以病足不肯試吏築室樂圃坊著書閲古吳人化其賢長吏至莫不先造請謀政所急士大夫過者以不到樂圃為恥名動京師公卿薦以自代者衆元祐中起教授于鄉召為太學博士遷祕書省正字元符初卒哲宗知其清賻絹百匹有文三百卷六經皆有辨説又著琴史而序其略曰方朝廷成太平之功制禮作樂比隆商周則是書也豈虛文哉蓋立志如此樂圃餘藁
