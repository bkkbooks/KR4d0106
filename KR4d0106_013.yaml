front:
  text: 樂圃餘藁跋二十二世祖樂圃先生平生所著詩文百卷兵燹之後盡為灰燼其傳于世者僅有吳郡圗經琴史墨池編數種而已嶽壽家舊有寫本餘藁十卷附編一卷係先生姪孫令達公裒次蓋其時已非全豹今則并其板亦不存矣嗟乎士君子讀書立言以期不朽班固藝文序云自漢以前文章家不下二萬人皆不傳夫傳之不傳天也後之人知其名不賭其文未嘗不欷歔嘆息況親為之苗裔乎嶽壽不克承家學敢祕諸篋衍而負先世制作之心乎用是忘其僭陋重加校讎付諸剞劂使好古之士讀之有以景前哲而貽後學有餘幸焉至于先生之行誼與文之典麗詩之淵雅前代巨公述之詳矣余小子更何容贊一辭康熙壬辰中秋二十二世孫嶽壽拜書
