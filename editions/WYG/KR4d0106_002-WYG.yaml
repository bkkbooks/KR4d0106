body:
  text: 樂圃餘藁巻二宋朱長文撰律詩雪夕林亭小酌因成拙詩四十韻以貽坐客昔歐陽公與人詠雪先戒勿用梨梅練絮白舞鵝鶴等字今篇中輒守此戒但愧不工伏惟采覽極望鋪千頃平觀徹九霄縱横隨物象合散委天飆洒竹聲微動粧松勢不揺庭空飛鳥影窓失逺山椒釣罷盈孤嶼行稀覆小橋爭先籠碧瓦騁巧綴柔條片片誰裁製團團似琢琱邱陵平坎險草木起枯焦皎潔那容染輕清秪自飄匊來便幼穉披去羨漁樵篷冷孤舟泊蹄輕逸驥驕危樓明皓皓虚室静蕭蕭餘霰霏殘夜層氷結霽朝界疑華藏見境入洞天遥嚮晦終難掩居高却晩銷潤滋甘井脉寒減暮江潮思婦啼紅袖征夫擁皂貂履穿愁踐足心悟任齊腰就映猶開巻頻餐愈病痟袁公當獨卧謝女尚能謡旋取茶鐺汎多收藥七調任令埋蠟屐直欲鼓蘭撓埽處迷三徑吟餘凍一瓢因思良友至急走牧童邀池館增蕭洒盃盤奈寂寥壼中聞笑語物外覩風標真樂非絃管竒辭脱篆雕紅塵蕩滌盡夙酒等閒消燭映凝膏淺香清切柏燒談圍終昜解詩將可稱驍聞道羣賢集方從五馬招黄堂催盛燕緹幕會英僚海氣連平野巖光滿麗譙繽紛霑壽斝炫晃照華鑣劉白才名重枚鄒筆力超袴襦歌美政牟麥慶新苗畎畝深盈尺風雲會再缺賀聲周四境瑞奏達中朝郡國仁風逺乾坤協氣饒年年書大有擊壤望唐堯仲春上丁知府金部躬率僚宷釋奠于先聖既而升公堂命學官講書竊惟中庸之篇自安定先生常以是誨人閱歳既久嗣音者希某孤陋無似竊慕前哲其啓講也今龍閣黄公嘗臨之其終講也金部使君又臨之羣儒在列咸與榮觀輒成五言律詩二十韻叙謝天意紹斯文成書在聖孫一篇窮妙理萬古誦微言美行敷華葉精誠固本根並明參日月幽賛極乾坤奥義誰鑚仰真儒善討論謂安定先生也披雲觀泰華行水自崑崙庠序非才處詩書素志敦崇朝羞倚席暇日廢窺園辨惑開羣聽潛心到本原意将追往哲學豈為專門盛府連稱治耆英繼典藩始終臨講席前後枉髙軒全帳羅金鼎盈庭倒玉樽旌旗來有慶衿佩寂無喧士識師資貴民知道義尊僖公史官頌鄭校相君存芹藻歡欣意陵阿長育恩中材多杞梓寳噐列瑶琨五紀登朝盛羣英蓍籍繁美哉文正學遺澤洽元元奉送中散使君提舉崇禧觀方面威名久朝端聞望隆需章祈玉陛寶詔與琳宫睿将均勞逸髙情保始終他年黄髪老清世紫芝翁迹放風波外心安夢幻中身輕隨壽鶴目極逺冥鴻祖帳羣公集啼嬰萬俗同何縁留召父無路達堯聰誇里金龜重榮先宻印崇髙堂羅俎豆幽徑剗蒿蓬趂健歌歸去因閑味道冲謝庭常有慶越槖任令空醉㡌欹華月吟髭動好風翠虬喬木老錦帳海棠紅平昔髙軒過深嗟陋巷窮嘘枯言不絶推轂賜嘗䝉載酒邀彭澤名鄉表鄭公量才如斷木荷德重維崧耆俊方圖任明廷正納忠劇藩如擇將猶恐起宗工光禄生日卿寺方生棘侯邦屢建旂才鋒周物理智燭見神機壽逺眉毛秀身康髩雪稀翠筠髙挺節古柏暗増圍雲陛朝升對銅符夕佩歸灌苗潛致茂針瘼坐令肥召杜名方重松喬志所希非才學詩禮多幸奉庭闈葉載神龜隱雛随彩鳯飛晨昏趨膝下永着老萊衣次韻司封使君和練推官春望之什目極江湖近心存象魏遥未調金鼎餗新泛玉觴椒賦為凭欄得憂從散帙消髙才方謝守輕舉羨王喬桃結千年蕊松抽百尺條天涯舟一葉風送逸漁樵送知府滕光禄牓登龍虎亞掄魁一紀横飛長憲臺謨議軒昂開日月辭章雄偉鼓風雷朝端已慶明良會廟論咸推将相才一跌雲衢成老大幾遷方面歎邅廻致君事業看霜髩經國風猷付玉盃驅弩屢驚園令出引章還喜買臣來展墳乍覺青松長視學追懷絳帳開榮滿江山増氣象仁霑里閈舞兒鮐齊雲晚詠難留白白傅将去蘇有齊雲樓晩望之作緑野新居欲繼裴淮海巨藩雖重寄傅巖須起作鹽梅喜雪上太守築壇精禱意通神零雨先期澤此民驟作六花猶及臘更遲一日即囘春斜飄燕寝初驚宻平壓髙樓漸喜匀千里山河忘險穢十門坊墅絶埃塵謝庭賀燕凌晨集郢曲歌聲遇景新細入吟窓粘凍筆輕隨舞袖落花茵膠舟漸進危檣逺汲井彌甘短綆伸遍擁枯根蘇杞栁巧粧寒葉活松筠終朝訟息延佳客幾度年豐達紫宸力可回天消旱暵為霖豈獨傅巖人上運使陳兵部屈指西州當世英我公傑出久知名自從揚馬竒才後又得岷峨靈氣清剛者近仁今始見惠而能政古難并胸羅萬象縱横壮目悦羣情黒白明已借牙籌安右輔尚留金節壓東瀛片章馳上雲霄動一檄飛前草木驚斷割劇繁如簡昜鍼砭痩瘠使豐盈此時阜俗資良策匪夕疇庸在老成竊愧衰姿毗太府幸逢雅量庇寒生欲祈陰施増仙筭幾見蟠桃結子榮蘇學十題并序蘇學昔有十題曰泮池玲瓏石百幹黄楊公堂槐辛夷石楠龍頭檜蘸水檜鼎足松雙桐是也或云蘓子美命名然篇詠莫傳殆有其名而無其辭也余頃至學中訪所謂十題者其存有六而龍頭檜蘸水檜鼎足松䨇桐亡矣蘇學故南園之地南園者錢元璙之所作也錢侯好治園林築山浚池植異花木充其中未久歸于國朝百年承平之間萬物茂遂得桓其生厥後割南園之巽隅以為學舍遺址餘木迄今有存者而建學之後繼有培植然間有為風霆之所偃㧞卒隸之所摧毁甚可太息夫亡則已矣其存者當為之珍惜因取六物又益之以多幹柏並秀檜新杉泮山復為十題題各有詩以傳來者庶幾觀是詩而愛其物勿翦勿伐則騶虞之仁行葦之厚見于學校之間矣豈止孔明廟柏攄少陵之幽憤太清仙檜發曼卿之竒藻好事博雅為之嗣音元祐壬申正月十有四日許州司户叅軍充蘇州州學敎授朱長文泮池怪石鋪幽麓芳塘倚茂林冷光開玉鏡清影滌人心芹藻無傷性龜魚各就深泉源應不涸何必傅巖霖玲瓏石巨浪洗蒼玉一峯飛我前鑿開混沌竅窺見滄浪天洞敞延華月巖虛生翠煙幽軒相對久古意日翛然百幹黄楊寳幹多材美孤根一氣同春餘花淡薄雪裏葉青葱蕃衍非人力堅剛稟化工寸枝裁玉軫可助舜南風公堂槐五紀栽培後三春長育中靈根蟠故國宻葉蔭儒宫患與般斤逺歌宜魯藻同先儒垂意逺期此出三公辛夷楚客曽留詠吳都獨擅竒風霆存老幹桃李避芳時名入文房梦一名木筆花功資妙手醫紫微顔色好先占鳯凰池石楠昔年曽賞玩移自碧山遥古幹磨文石寒枝慰翠綃雖殊楩梓用終免雪霜凋來者宜珍護毋令困採樵多幹柏古柏列重門連枝若弟昆參天分直幹得地共靈根月照龍蛇影風摧鐵石痕鸞凰期可宿香葉向春繁並秀檜槃根幾百齡合幹倚冥冥偃蹇䨇虬聳聨翩兩葢青紫鱗霜外躍紺葉雨餘馨左紐憑仙宇何如供泮亭新杉弱植還生意凌冬見後凋尚低霑雨露更長拂雲霄庭月揺疎影簷風舞細條他年逢匠石寶搆壮天朝泮山山形拱泮宫林壑意無窮自得千巖秀無虧九仞功光延東嶺月清轉碧潭風官冷真相稱婆娑一釣翁送曹縣丞入京忠義家聲久夫君更美才吏民愁旣去交友約重來君有居吳之意别岫浮雲逺征帆曉月開棣華同郡府眷戀共銜盃次韻司封使君和推官早梅山茶二首嫩跗黏絳蠟輕朶挿珠鈿雪裏心偏苦花中達最先玉階香馥郁煙野蕊聨娟託植雖然别黄金子並圓柏葉元同翠桃顔未比紅留芳占春月弄蕊耐秋風自稱階庭翫休煩帟幕籠佳篇補韋白流品重吳中梅評事携詩過訪欲求屬和因次其韻築室尋幽處唯求水竹隣心安何必貴累少莫如貧石裏求竒古花中悟道新不須多轍迹猿鶴自為賔次韻司封使君和練推官再咏山茶珍木何年種繁英滿舊枝開從殘雪裏盛過牡丹時對日心全展凌風幹不欹藥階如賦詠欠此尚相思次韻練定公權垂訪樂圃之什隱圃甚蕭條驅車豈憚勞境從前代勝岡對逺山髙林曉猿抽臂池秋鶴浴毛興來頻就醉竒句僕離騷賀林承務還吳門朱顔充賦早蒼髩拜恩歸煙水鶺鴒聚霜穹鴻雁飛傳經金耻富下筆玉藏輝貴仕毋嫌晩天門受賜衣寄和晏守二年懷郡印八度到柴扉曽未陪朱履頻煩友布衣水邉孤鶴睡天際片雲飛拜德知何日煙霞戀翠微和公權秋暑奉懷誰謂雲中句能移江上峯清颷隨玉楮爽氣襲塵容劇暑嬰多病嘉招恨未從眷言相與意深荷故情濃再和鄉校叨微禄家林傍舊峰散人那適用逋客拙為容良友幸不棄華軒時肯從早秋須命駕荷葉露華濃光禄生日舜庭新遣牧漢寺舊名卿致主丹心在憂民素髪生鷲峯仙桂老猿澗古松清金簡傳真理期頥體更輕樂圃餘藁巻二
