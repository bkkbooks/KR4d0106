body:
  text: 樂圃餘藁巻三宋朱長文撰律詩䝉使君召預池光之會韋公池閣尚依然賔主于今不乏賢郡内欣逢兩耆俊樽前喜會四同年清談自可成珠玉真賞何須聽管絃燕罷旌旗揺暮靄蔡經寂寞别羣仙遊虎邱借前韻一邱雖小勢巉然自古登臨歴幾賢門惹白雲常盡日地藏靈劒不知年清歡相與隨雙斾幽趣誰能解七絃毎月來遊存故事郡中依舊有詩仙次韻蒲左丞宗孟遊虎邱二首命相将乗傅說舟愛山尋遍樂天遊先聲汶北安千里選勝吳西賁一邱静見隴雲生峭壁寒知海氣入危樓鏘然佳句留蕭寺剡紙朝來貴此州蓬島竒峯水四環何年涌出向人間清池不測通滄海寳玉長存潤碧山曾致神仙留歎咏可憐軒冕樂蕭閒謝公方為蒼生起戀戀煙蘿日暮還次韻朱牧樂圃宴有感竊禄都無簿領迷得錢邀客手頻携春來佳景廻三徑雪後晴波滿一溪歳月昜凋青髩色塵埃難上白雲梯煩君枉駕慙荒索空種梧桐待鳯棲次韻彦舒席上之作蒼煙寒水滿方塘挿架排籖典籍場喜對七賢閑把手希逢四皓醉飛觴林深逈出千齡幹圃中有千齡檜詩就俄成萬丈光逸興欲尋丁氏宅雲間老鶴共昂昂奉謝司封使君晏公臨顧園居閑卧林泉與世疎使君三度枉旌旟未陪徐孺升賔榻敢屈文侯式敝閭蹔擲魚竿絲半巻旋開松徑艸新鋤愧無美酒拈巾漉難得金波欵緒餘未入柴扉即下車茅齋揮麈緩綸書不知銅虎威權重豈責荷衣禮貌疎此日狂歌希魯望昔年能賦擬相如篋中殘藁如傳後雖枉朱轓亦不虛甘盤德業滿天區博學承家行有餘鳯翥頻觀先帝詔牙籖新補相君書晨羊不飲康衢静夜犬無聲獄犴虛風績已應推第一鼇峰深處列仙居次韻虎邱祖印秋日懷寄不愛紛華愛寂寥松風竹月共蕭蕭因隨野鶴過三徑每對江鷗洗一瓢無復塵埃沾短褐尚思煙水泛歸橈道人肻與羲之友飛錫重來莫待招重九同子通遊虎邱與祖印三首絶境良辰少兩全榰笻莫倦到山巔清談已可忘樽俎真樂何勞聽管絃才子就題黄絹語高僧多誦碧雲篇孤舟欲去更囘首天畔樓臺生晩煙秋山寥曠景無涯執手凭欄到日斜地竦一邱容澗谷天低四面納雲霞凌風劇飲從吹㡌多病忘情懶挿花深美二難兄弟好共将嵓壑占為家浮世誰知金石堅吟鬚俄頃見皤然登山未免懷千古汎菊相期保百年方外逸民猶有傳人間髙爵豈如仙良辰盛燕多遺迹何似江南五栁賢彦和善談性理子文繼成偈句見要屬和謹次韻萬法都明一瞬中可憐情膜久相蒙浮雲映月元非暗病眼生花本是空斷想求真猶未悟将心覓學轉相攻誰能汲盡曹溪水莫負當年祖道東彦和與子文相期卜隣子文作詩以遺謹次韻仙才宜在道家山却學幽人欲閉關清燕曽陪明主問羣言以助相君刪談圍莫敵書盈腹詩社相過酒滿顔聞道卜隣同喜慰亦開荒徑待餘閑次韻子文抱病幽居之作二首幾年彩筆擅辭場髩髮相饒色更蒼千里舊聞稱驥騄九霄安得接鸞凰醉凭浄几抛烏㡌閑捲新詩置錦囊治世莫将公幹比松陵風物勝清漳好閑不復愛輕肥病起神清與道宜藥竈夜寒新焰歇書窓晝寂竹陰移坦懷莫學窮途哭行已應無屋漏欺里巷遊從須勉强相逢猶記是童兒佳雪應時呈司封使君三首蘇臺風雨久如期太守精神不待祈萬廩更為來嵗計六花故就臘晨飛静装松桂仙枝老深壅芝蘭土脉肥衡泌棲遲牆仞逺為公何日賦緇衣炫晃天花著物新壺中萬景浄無塵光輝只欲饒寒士清潔尤宜比古人韋白吟詩飄入硯鄒枚燕處舞廻茵明年霄漢横飛去應踏繁霙拜玉宸千里江山入郡樓凭欄乍喜宻雲浮冷光交映天峯色餘潤遥隨笠澤流民叠袴襦看不厭客叢簮履賞應留野人乘興狂吟外引鶴披蓑上釣舟次韻司封使君新嵗喜雪玉燭均調應改元賢侯喜雪望堯天太守詩云王正首此書佳瑞三見元豊大有年暗聲撒竹髙齋夜瑞彩連雲畵㦸前千里湖山成洞府萬家觴咏展賔筵應憐陋巷袁安卧擁褐孤吟又過年次韻司封使君立春紀事碧瓦猶藏臘雪寒東杓初向斗旁觀雪随華旦天京逺雉舞條風野老歡月令立春日條風至雉雊官栁嫩黄迎皂葢園蔬新緑委金盤詩才例作姑蘇守一曲陽春喜嵗端次梅評事韻滿目紅塵泪沒深誰能世事總無心買松野老栽成徑覓竹山僧種滿林薄酒時斟資道氣好詩頻諷滌煩襟鳯雛先顯門庭喜應笑陶潛責子吟梅公書齋挂簑笠釣綸船檝四物形於詩句余為和之快檝輕輪笠與衣閑将四物挂柴扉江頭夜雪好披去湖上春光宜棹歸静處無憂嫌印綬貧中有味勝輕肥興來願借君毋恡渺渺煙波一葉飛次韻公權子通唱酬四首春晩遣懷春華急似曉天星誰得年年髩髮青露濯淺深枝上錦風吹離合水中萍吟餘金谷香隨歩書罷蘭亭酒欲醒擬把冽泉同一酌為君林下洗寒瓶吳門懷古九曲湮淪茂苑荒吳人誰復怨吳王莫言故國千秋逺知是仙家幾日長湖上只誇浮海相里中休笑傚顰娘舊時幽徑今猶在但屬漁樵自採香春日旅懐身在塵勞未免憂傷春佇立碧江頭囘腸只殢千鍾飲方寸那容萬斛愁懶㸔錦袍凌巨浪好乘黄犢傍髙邱池塘得句頻相示直把珠璣為暗投牡丹竒姿須待接花工未必妖華限洛中應是春皇偏與色却敎仙女愧乘風朱欄共約他年賞翠幄休嗟數日空誰就東吳為品第清晨子細閲芳叢奉和司封使君春日囘文之作佳景更同民共樂俊髦皆集盛飛觴花隨客醉還成句桺贈人行欲斷腸斜月上時霞散錦暖風來處寝凝香華年惜過須心賞富貴叢身逼髩霜次韻司封使君程給事通波隄上幾鞦韆花接遥山水接天故里松楸霑雨露神都池苑隔雲煙耕桑交勸紅塵外羅綺紛遊畵舫邊暫歇丼棠隨衆望不禁野岸更聞鵑司封盛篇甚有㱕思輒寫公意以賦是詩次韻司封使君和給事寒食城外感事花如步障草如茵萬景繁華在此旬金印誰來誇故里宻章燔了賁慈親莫看白髪興千感好共朱轓醉一春俱是詩人兼富貴只疑元白是前身吳門比月不雨司封使君深閔而精祈俄有佳應謹吟成七言二首聊代謁賀賢守憂勞髩欲霜通宵霡霂滿吳疆五湖水濶魚龍喜九曲塵清檜栢香九曲路自胥門外至姑蘇臺更入髙鄉多䆉稏雖當淺處泛艅艎為霖事業傳家世澤潤應難限一方一雨歡心幾萬家預期舂稻博流霞低侵滬瀆田交岸今嵗低田畢種松江瀉海曰滬瀆也髙傍支山水滿車葉幄謾霑桃李實隄奩暗長芰荷花豐年闔境渾無事閑把詩毫放兩衙樂圃餘藁巻三
