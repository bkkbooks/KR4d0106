body:
  text: 樂圃餘藁巻九宋朱長文撰世譜朱氏世譜髙辛氏有才子曰朱虎臣於堯當舜之舉益以虞也葢嘗薦虎代己自虎之後遂氏以朱歴夏商無聞焉周有朱張以逸民顯其後在齊者曰毛在魏者曰亥在楚者曰英而譜氏族者以謂高辛氏之後有六終産六子其第五子曰安周武王克商封安苖裔俠於邾附庸於魯後為楚所滅子孫去邑為氏此亦朱氏之所出也二漢之間魯有家吳有買臣平陵有雲杜陵有博宛有岑暉會稽有雋沛有浮㝢㝢為司𨽻校尉坐黨錮誅子孫自相逺避難丹陽遂籍吳郡吳時有治有然有桓頗著勞烈陸機詩云八族未足侈四姓實名家四姓者朱張顧陸也迄于江左間出顯者唐有敬則實相武后逮唐衰譜牒淪渙其詳莫究至我高祖為越州剡人髙祖諱滋會董昌亂越錢氏據杭隱居田里涵德匿耀鄉人尊之武肅王嘗召寘幕府卒辭以去年八十九卒生于唐乾符之丙申卒于本朝乾德平蜀之歳葬剡之游謝鄉有子四人長曰某次曽祖也次曰承厚次曰承福曽祖諱瓊百行完粹達于從政錢氏以宗子守明州高選僚屬仕于四明遂家焉卒葬于鄞縣生四子長曰曙次曰昉次曰萬季吾大父也昉生正倫公言公輔正倫三班奉職吾大父諱億始來京師太宗皇帝召對便殿仍命以官自壮年越于耆齡其所歴皆有功最接人和待物厚取與義治家嚴賙親戚不吝以内殿崇班閤門祗候守邕州卒葬于蘇州吳縣南峯山西贈刑部尚書生五子長曰炳才高文竒不幸未仕而死次先君也先君諱公綽少從學范文正公為髙弟以辭章魁冠士林擢進士第仕至光禄寺卿歴彭州廣濟軍舒州太守民聞至而喜去而思有智謀才術而未盡其用也曜早世次公彦長洲主簿次公愿今以宣德郎致仕先君生六子長曰長文宣德郎太學博士次百藥早卒次仲方明州象山尉次季端頴昌府節度推官次叔暐早卒次從悌瀛州防禦推官監陳畱酒税自承厚之曽孫曰昱與大父同徙姑蘇昱生何登進士科為循州司户叅軍卒何生二子曰甽曰虎甽今為朝散郎通判楚州髙祖之諸孫在剡居宋村􅣯山者曰德昌曰德倪德昌之子曰仁賞德倪之子曰仁長曰仁遇曰仁盛四人者各有子皆服先疇不失舊業嗚呼自伯虎著名于帝典儀父見美于春秋發源旣長釃派不絶逮本朝之興昂顯于荆㢲顯于揚符顯于蜀寀稱于宋其他列于朝者亦衆而華亭朱氏至郡守監司者三人于東南為盛惟姑蘇之族遷自會稽祖考濟美艱難勤苦夙夜事事用克有家施及子孫繼襲簪紱廼為之譜以示于後在我後人追孝于前哲繼志于奕世勿墜厥緒勿隕厥聲豈不休哉紹聖二年九月明堂禮畢後五日裔孫長文謹識書與諸弟書某自幼稚知以事親養志好古讀書為樂生十年旣代先人筆札十五能代書啟挾策執筆日侍左右一日不見則惄然不樂先人于余也亦然以此跬歩未見嘗輒去膝下先人嘗曰前哲有云祖孫更相為命吾與爾之謂也嘉祐中侍行之彭州與成都漕臺薦将赴禮部父子相視不忍别是時先人初為正郎當任子而遵義弟始生余因白曰使某偶得科名則恩可以官一弟先人亦曰起吾家者必汝其勉行明年果擢第而遵義以蔭得官余旣登第不俟賜宴歸省于彭未遑仕進既而還都偶墜馬傷足嘗嘆曰吾因是疾可以脱遺軒冕專事溫清此人子之至樂也先人倅東平守定陶居姑蘇治同安往還二十年皆侍焉在同安會郊禋先人愍余乆不仕欲以任子恩丐除一幕職官且曰吾将從汝之任余固辭不肯剡奏願以薦季弟先人不得已而從之拊季弟曰兄以官畀汝汝長當善事汝兄因名之曰從悌使其顧名而思義也熈寧末奄丁大禍自睢陽走吳門首治大葬奉終之禮敢不曲盡重椁巨甓要之無悔既葬乃即圃中作䆳經堂増廓廡數間以聚兄弟存親戚惟先人以清白遺子孫于鄉里罕嘗置田宅遺孤滿室累然無依兩叔父愍之稍分先祖之舊業聊以周贍復自取囊中器皿粥之即葺其壤稍稍増置粗周日用伯姊喪其夫李元魯挈家相依比數年之間歸十五妹于曹氏十八妹于賈氏二十妹于李氏二十二妹于史氏二十三妹于陳氏末又歸伯姊于石氏為遵義景仁兩弟娶婦嫁娶凡十數所靡多矣其後戚屬加多用益不足頃者諸公論薦被命掌學始将固辭既而曰得微禄自贍推舊産以畀諸弟可以紓憂豈非幸哉居官三年來學者甚衆誦講課程孜孜所職于俗事固無暇然三弟相繼家居余不須治近既遷居學舍難省其私可以推避今以姑蘇祖父田産其數已具别幅推與三弟余更不取之庶成辭遜之素志惟園宅之地于此隱居久矣前郡守章公伯望名其坊曰樂圃以旌幽迹當與諸弟共守之用傳子孫不可壞也先疇舊産自祖父以來置之實艱諸弟善治之勿致隳損猶可以資飲食伏臘之費豈得忽諸夫立身治家莫若勤儉勤則無曠儉則昜足古人所尚不復多云先人起於寒素仕至二千石雞鳴而起夜分而寐出則涖事入則閱文未嘗休已平居早膳不兼味晩或茹蔬飲酒不過三觴而已汝軰所親見可不履踐哉兄弟人之大倫也凡今之人莫如兄弟故孝友者百行之本余與汝當勉之范文正公置義田義宅至今四十年而丞相侍郎兄弟繼成其志近益増廣九族之間莫不被其惠况汝諸弟皆同生守其舊業可以同處詩云髙山仰止景行行止可不慎哉元祐五年十月某日兄某白題䟦題丞相范純仁詩後范丞相至和中始除文正公之喪會其族兄龍圖公貫之諱師道自許州通判召為御史作詩三篇以送之貫之之孫耕欲刻石願有述也長文竊觀貫之精忠峻㓗其為御史當仁祖之時中外穆清而能危言直繩詆相使罷去而天子疇咨舊德登用文富繼以韓公嘉祐之盛人物典章庶幾於三代之隆者貫之之益為多與丞相詩意之所屬者無所不合然則此詩之諷與風雅何異刻石貽後不亦宜哉范氏自文正公為全德良弼而貫之嗣稱名臣及丞相以直道致台輔吏部以厚德儀中臺寳文以籌策帥邊州奕葉載德為邦家光彩可謂世濟其美者也元祐癸酉五月朔吳郡朱長文題某旣題丞相詩後而德充德雍求書石比以倥偬未遑也行過惠山酌清泉拊古松廼歸舟次面山臨水躊躇久之援毫揮汗為寫累紙媿不工也幸使良工模之七月三日長文祗白祭文祭林大卿文鳴呼漢稱汲鄭唐美王魏峻節直聲世難其繼公起孤童騰聲八龍辭嚴氣偉光彩長虹銅章旣綰威行愛充位卑名崇聞于堯聰執憲熈寧廷爭是議毅然觸邪毋憚用事維時大農勢炙可熱朝登此官暮入紫闥公辭是命確不可奪寧絀海隅完我大節治邑維何鋤刈姦慝副麾邊州河災以息邅廻歳紀歸覲京國搆我二聖任之臺郎平昔省寺茍安習常公若治外嚴繩謹防窒私抑倖功罪自彰復邦御史有違必糾排殛憸苛追復忠厚讜言屢獻十用八九並塞數城僉為難守公言我疆弃我戎醜河隍臯蘭是保是有公請外補廼按淮堧粒民于殍孰困凶年剔賊剗蠧孰怠孰愆廼升都司綱領衆職疑讞必宥益廣天德抉弊燭隱吏皆歛息引嫌避劇我長篷瀛兼直華閣進為列卿将翺将翔羣望已傾忽持漕節于晉之坰彼蒼者天喪我老成遐蘊不究奄歸冥冥神理莫問胡嗇其齡公之為人鍊金追璧疇為强矯吾以理詘疇為淑良遇若友戚推賢與能樂盡已力不用不已心以義激嗟我固陋遁于邱園公初來臨泉石之間薦之譽之不倦嘉言連蹇莫報徒銘厚恩老從杖履夙願則然半途永訣淚洒幽泉悲甚輟舂歎幾絶絃絮酒雖薄公其格焉銘奠酒臺銘重桉横前羣岡抱麓封高穴深不置金玉歴千百世過之必肅疇窆於斯朱氏光録樂圃餘藁巻九
