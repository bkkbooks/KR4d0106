body:
  text: 樂圃餘藁補遺太守召陪諸公遊虎丘海湧一小山逺視如陵丘中藏天下奇巖谷峻且幽石壁立萬古劒池照千秋蕞爾小吳㑹隠然瞰瀛洲能令軒冕客到此忘沈憂樂天擁千騎一月常一遊髙賢愛絶景塵事莫可留我公初下車明㫁速如流千里滿和氣訟庭無繋囚三英皆虜使金節憩南州楊次公張仲謨林和中同聲約真賞相應如鳴球半刺富文雅嘉賓張與劉徳文景文清晨出西閶山翠逼蘭舟耕叜迎彩斾佳禽和鳴騶凴䦨共四顧湖海入危樓雲低未作雨萬象圍寸眸憲老揮散隸妙絶與古儔河漢淡輕靄天門跳驚虯才名三十年餘事及銀鈎兹遊雖偶然千載仰芳猷日暮下危磴玉桮相獻酬一篇間一局豪放不自休樂哉文字飲相與喜賢侯短篇春事勝可與吳兒謳三髙贊并序古之人有時隠者有志隠者時行則行時止則止秉義安命動息惟天夫是謂時隠憤世嫉邪矯以端清逍遥雲泉終老不詘夫是謂志隠昔之范蠡張翰陸龜蒙皆隠者也鴟夷子知勾踐可與平吳而不足以與霸中原于是遁而遊五湖季鷹知衰晉之將亂于是去而歸江東魯望逢懿僖之昏季于是退而居甪里此三君子之隠皆得其時而又能固其志者也百世之下其清風猶凜凜竦人毛骨饕夫思亷夸者思止可勝計哉舟次松江江之濱有鱸鄉亭亭旁圖三君子之形榜曰松陵三髙畫像此前宰林君肇之所作也欽覩容儀遂為之贊云吳郡朱長文書恢恢至人在物無累道用則行功成迺逝卓哉鴟夷逢此周季大禹之苗才可經濟深鎖雲岩為君一起沈幾電燭逺畧人秘劬躬疚心以日以歳民阜其財士溢其氣不疾不徐迺御戎器滌越之憤墟吳之侈奮威諸侯致貢天子儻終所施一正華裔网使夷吾在昔専美烏喙多猜龍泉戢銳脫屣公卿浮雲富貴甽澮江海席幕天地世無足為吾獨全已遯迹韜光寚貞育粹萬藴一伸財擅當世退而彌髙隠不失利中古以還一人而已寥寥松陵澄湛天際雖曰至清曷為公比勇退維仁前知維哲飄飄先生茂有風烈衰晉失綱强宗搆孽盛氣方炎危機欲發衆皆沈酣子獨超越旁睨冠珮如處縲絏海鷗忽飛一去寥泬衣無俗塵身並江月我厭蓴鱸彼懼鈇鉞潘石難追機雲永訣莫如先生逺禍安節千載清風革貪思潔退不期進文不干榮古之真隠見于先生先生之時唐棟將傾綱紀不紊戈矛欲興子維布衣車輿盈庭超然逺引遯于松陵右觀震澤左瞰滄溟鱸登秋網蓴薦春羹疇不憂慄我獨安行疇不諂笑我獨潔清放懷蕭散養性和平言奇而古金石厥聲逍遥終年孰敢羈嬰歌聞接輿醉有淵明猗歟君子異代同稱樂圃餘藁補遺
